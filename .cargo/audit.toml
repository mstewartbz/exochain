# EXOCHAIN cargo-audit configuration
#
# Gate 6 runs:
# cargo audit --deny unsound --deny unmaintained
#
# cargo-audit scans the full Cargo.lock, including compile-time and transitive
# dependency paths. Every ignored advisory below must correspond to an advisory
# currently emitted by an unconfigured cargo-audit run; stale ignores are blocked
# by tools/test_audit_ignore_policy.sh.
#
# Yanked advisories are warning-only under Gate 6 today. No yanked advisory is
# currently suppressed in this file.

[advisories]
ignore = [
    # paste — no longer maintained.
    # Transitive proc-macro utility via async-graphql; no runtime code path.
    "RUSTSEC-2024-0436",

    # rsa Marvin timing attack.
    # Present through SQLx MySQL support pulled by the upstream SQLx macro stack.
    # EXOCHAIN runtime DB access is PostgreSQL-only; MySQL connection support is
    # not exposed by any owned runtime configuration.
    "RUSTSEC-2023-0071",

    # rustls-webpki URI name-constraint bug.
    # Present through the Rustls stack used by axum-server, reqwest, SQLx, and
    # libp2p. EXOCHAIN does not accept URI name constraints as an authority
    # source for constitutional identity or delegation.
    "RUSTSEC-2026-0098",

    # rustls-webpki wildcard name-constraint bug; same reachability analysis as
    # RUSTSEC-2026-0098.
    "RUSTSEC-2026-0099",

    # rustls-webpki CRL parsing panic.
    # EXOCHAIN does not configure CRL parsing on owned TLS paths.
    "RUSTSEC-2026-0104",
]
