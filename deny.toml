# EXOCHAIN cargo-deny configuration
#
# Constitutional requirement: the trust fabric must not incorporate
# dependencies with incompatible licenses or known vulnerabilities.
#
# Reference: CR-001 Section 8.8 — Dependency Governance

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]
all-features = true

# ---------------------------------------------------------------------------
# Advisories - documented exceptions for dependency advisories
# ---------------------------------------------------------------------------
# Gate 6 currently runs cargo-audit with vulnerabilities by default plus unsound and unmaintained warnings denied explicitly:
# `cargo audit --deny unsound --deny unmaintained`.
# Gate 7 runs cargo-deny against this file. Any new ignored advisory must be
# patched or explicitly justified here with:
#   - Advisory ID (RUSTSEC-YYYY-NNNN)
#   - Crate and version range affected
#   - Why it does not apply to this workspace
#   - Linked issue for tracking resolution
#
# The entries below are pre-existing transitive dependencies present in main
# as of v0.1.0-alpha.  They are NOT introduced by any Sprint 4 change.
# Each entry is tracked for upgrade in a follow-up dependency-hygiene sprint.
[advisories]
ignore = [
    # paste — no longer maintained.
    # Transitive dep via async-graphql macro infrastructure (pre-existing in main).
    # paste is a proc-macro utility; the unmaintained status poses no runtime risk.
    # Upgrade tracked in APE-12 hygiene sprint.
    { id = "RUSTSEC-2024-0436", reason = "pre-existing transitive via async-graphql; proc-macro only; no runtime security impact" },

    # derivative — no longer maintained proc-macro.
    # Transitive via ark-crypto-primitives -> ark-groth16 -> risc0-groth16 ->
    # risc0-zkvm (VCG-001c risc0 verifier-only vendoring, ratified decision D1).
    # derivative is a compile-time-only derive-macro helper (generates trait
    # impls at build time); it has no runtime surface and ships no code that
    # executes against untrusted input. Upgrade tracked alongside the eventual
    # arkworks/risc0 version bump.
    { id = "RUSTSEC-2024-0388", reason = "derivative is an unmaintained compile-time-only proc-macro pulled transitively via ark-crypto-primitives -> ark-groth16 -> risc0-groth16 -> risc0-zkvm (verifier-only vendoring, VCG-001c); no runtime code path" },

    # tracing-subscriber 0.2.25 — ANSI escape sequence injection in output
    # formatting when logging untrusted input directly to a terminal.
    # Transitive via risc0-zkvm's own dependency tree (arkworks-internal
    # tracing instrumentation, e.g. ark-relations). EXOCHAIN does not use this
    # tracing-subscriber version to format or log untrusted external input —
    # it is an internal dependency of the vendored verifier crate graph, not
    # a logging sink this workspace configures or writes to.
    { id = "RUSTSEC-2025-0055", reason = "tracing-subscriber 0.2.25 ANSI-injection advisory concerns logging untrusted input to a terminal; pulled transitively via risc0-zkvm's arkworks-internal tracing instrumentation, not used by EXOCHAIN for untrusted-input logging" },
]

# ---------------------------------------------------------------------------
# Licenses — Apache-2.0 is the workspace license.
# We allow permissive licenses compatible with Apache-2.0.
# All non-listed licenses are denied by default (v2 behavior).
# ---------------------------------------------------------------------------
[licenses]
# Confidence threshold for license detection
confidence-threshold = 0.8

allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    # MPL-2.0 is file-level copyleft, compatible with Apache-2.0 for combined works
    # Required by: ascii_utils (via async-graphql), fast_chemail (via async-graphql)
    "MPL-2.0",
]

# Some crates have non-standard license expressions
exceptions = []

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ---------------------------------------------------------------------------
# Bans — prevent problematic crates
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
# External and path wildcard dependency requirements weaken the supply-chain gate.
# Publishable workspace path dependencies must carry exact package versions.
wildcards = "deny"
allow-wildcard-paths = false
highlight = "all"

deny = [
    # No OpenSSL — we use pure-Rust crypto (ed25519-dalek, blake3)
    { crate = "openssl-sys", wrappers = [] },
    { crate = "openssl", wrappers = [] },
]

# ---------------------------------------------------------------------------
# Sources — only allow crates.io and our own git repos
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
