# EXOCHAIN cargo-deny configuration
#
# Constitutional requirement: the trust fabric must not incorporate
# dependencies with incompatible licenses or known vulnerabilities.
#
# Reference: CR-001 Section 8.8 — Dependency Governance

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]
all-features = true

# ---------------------------------------------------------------------------
# Advisories — reject any crate with a known security advisory
# ---------------------------------------------------------------------------
# Gate 13 strict mode: CI runs `cargo audit --deny warnings` (APE-54).
# Any new advisory must be patched or explicitly justified here with:
#   - Advisory ID (RUSTSEC-YYYY-NNNN)
#   - Crate and version range affected
#   - Why it does not apply to this workspace
#   - Linked issue for tracking resolution
#
# The entries below are pre-existing transitive dependencies present in main
# as of v0.1.0-alpha.  They are NOT introduced by any Sprint 4 change.
# Each entry is tracked for upgrade in a follow-up dependency-hygiene sprint.
[advisories]
ignore = [
    # ring 0.16.x — AES functions may panic when overflow-checks are enabled.
    # Impact: only triggered in debug builds with overflow-checks=true.
    # Our release profile has overflow-checks=false (lto=true, codegen-units=1).
    # ring 0.16.x is a transitive dep via rustls-webpki (pre-existing in main).
    # Upgrade tracked in APE-12 dependency-hygiene sprint.
    { id = "RUSTSEC-2025-0009", reason = "pre-existing transitive via rustls-webpki; only affects debug overflow-check builds; release profile safe" },

    # ring 0.16.x — versions prior to 0.17 are unmaintained.
    # Same transitive dep as above; same tracking issue.
    { id = "RUSTSEC-2025-0010", reason = "pre-existing transitive via rustls-webpki; upgrade tracked in hygiene sprint" },

    # rsa — Marvin Attack timing side-channel.
    # rsa is a transitive dep via sqlx (pre-existing in main).
    # The workspace does NOT enable the sqlx 'mysql' feature, so the vulnerable
    # RSA path is never exercised.  Upgrade tracked in APE-12 hygiene sprint.
    { id = "RUSTSEC-2023-0071", reason = "pre-existing transitive via sqlx; mysql feature not enabled; vulnerable path unreachable" },

    # instant — no longer maintained.
    # Transitive dep via wasm-timer / yamux (libp2p stack, pre-existing in main).
    # instant is a thin no-std shim; the unmaintained status poses no security
    # risk.  Upgrade tracked in APE-12 hygiene sprint.
    { id = "RUSTSEC-2024-0384", reason = "pre-existing transitive via yamux/libp2p; unmaintained shim with no security impact" },

    # paste — no longer maintained.
    # Transitive dep via async-graphql macro infrastructure (pre-existing in main).
    # paste is a proc-macro utility; the unmaintained status poses no runtime risk.
    # Upgrade tracked in APE-12 hygiene sprint.
    { id = "RUSTSEC-2024-0436", reason = "pre-existing transitive via async-graphql; proc-macro only; no runtime security impact" },

    # lru — IterMut violates Stacked Borrows (unsafe aliasing).
    # Transitive dep via existing caching infrastructure (pre-existing in main).
    # The workspace does not use IterMut on lru caches directly.
    # Upgrade tracked in APE-12 hygiene sprint.
    { id = "RUSTSEC-2026-0002", reason = "pre-existing transitive dep; workspace does not call lru::IterMut; no exploitable path" },
]

# ---------------------------------------------------------------------------
# Licenses — Apache-2.0 is the workspace license.
# We allow permissive licenses compatible with Apache-2.0.
# All non-listed licenses are denied by default (v2 behavior).
# ---------------------------------------------------------------------------
[licenses]
# Confidence threshold for license detection
confidence-threshold = 0.8

allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "BSL-1.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
    # MPL-2.0 is file-level copyleft, compatible with Apache-2.0 for combined works
    # Required by: ascii_utils (via async-graphql), fast_chemail (via async-graphql)
    "MPL-2.0",
]

# Some crates have non-standard license expressions
exceptions = []

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ---------------------------------------------------------------------------
# Bans — prevent problematic crates
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
# Workspace-internal crates use path dependencies (wildcard version)
wildcards = "allow"
highlight = "all"

deny = [
    # No OpenSSL — we use pure-Rust crypto (ed25519-dalek, blake3)
    { crate = "openssl-sys", wrappers = [] },
    { crate = "openssl", wrappers = [] },
]

# ---------------------------------------------------------------------------
# Sources — only allow crates.io and our own git repos
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
