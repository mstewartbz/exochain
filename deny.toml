# EXOCHAIN cargo-deny configuration
#
# Constitutional requirement: the trust fabric must not incorporate
# dependencies with incompatible licenses or known vulnerabilities.
#
# Reference: CR-001 Section 8.8 — Dependency Governance

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]
all-features = true

# ---------------------------------------------------------------------------
# Advisories — reject any crate with a known security advisory
# ---------------------------------------------------------------------------
[advisories]
ignore = []

# ---------------------------------------------------------------------------
# Licenses — Apache-2.0 is the workspace license.
# We allow permissive licenses compatible with Apache-2.0.
# All non-listed licenses are denied by default (v2 behavior).
# ---------------------------------------------------------------------------
[licenses]
# Confidence threshold for license detection
confidence-threshold = 0.8

allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "BSL-1.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
    # MPL-2.0 is file-level copyleft, compatible with Apache-2.0 for combined works
    # Required by: ascii_utils (via async-graphql), fast_chemail (via async-graphql)
    "MPL-2.0",
]

# Some crates have non-standard license expressions
exceptions = []

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ---------------------------------------------------------------------------
# Bans — prevent problematic crates
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

deny = [
    # No OpenSSL — we use pure-Rust crypto (ed25519-dalek, blake3)
    { crate = "openssl-sys", wrappers = [] },
    { crate = "openssl", wrappers = [] },
]

# ---------------------------------------------------------------------------
# Sources — only allow crates.io and our own git repos
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
