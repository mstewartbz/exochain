# EXOCHAIN cargo-deny configuration
#
# Constitutional requirement: the trust fabric must not incorporate
# dependencies with incompatible licenses or known vulnerabilities.
#
# Reference: CR-001 Section 8.8 — Dependency Governance

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]
all-features = true

# ---------------------------------------------------------------------------
# Advisories - documented exceptions for dependency advisories
# ---------------------------------------------------------------------------
# Gate 6 currently runs cargo-audit with vulnerabilities by default plus unsound and unmaintained warnings denied explicitly:
# `cargo audit --deny unsound --deny unmaintained`.
# Gate 7 runs cargo-deny against this file. Any new ignored advisory must be
# patched or explicitly justified here with:
#   - Advisory ID (RUSTSEC-YYYY-NNNN)
#   - Crate and version range affected
#   - Why it does not apply to this workspace
#   - Linked issue for tracking resolution
#
# The entries below are pre-existing transitive dependencies present in main
# as of v0.1.0-alpha.  They are NOT introduced by any Sprint 4 change.
# Each entry is tracked for upgrade in a follow-up dependency-hygiene sprint.
[advisories]
ignore = [
    # paste — no longer maintained.
    # Transitive dep via async-graphql macro infrastructure (pre-existing in main).
    # paste is a proc-macro utility; the unmaintained status poses no runtime risk.
    # Upgrade tracked in APE-12 hygiene sprint.
    { id = "RUSTSEC-2024-0436", reason = "pre-existing transitive via async-graphql; proc-macro only; no runtime security impact" },

    # rustls-webpki 0.103.10 — name constraint URI names incorrectly accepted.
    # Present through the Rustls stack used by axum-server, reqwest, SQLx, and
    # libp2p. EXOCHAIN does not accept URI name constraints as an authority
    # source for constitutional identity or delegation.
    { id = "RUSTSEC-2026-0098", reason = "EXOCHAIN does not use URI name constraints as constitutional authority" },

    # rustls-webpki 0.103.10 — name constraints accepted for wildcard-name certs.
    # Same transitive path, same reachability analysis as RUSTSEC-2026-0098.
    { id = "RUSTSEC-2026-0099", reason = "EXOCHAIN does not use wildcard name constraints as constitutional authority" },

    # rustls-webpki 0.103.10 — reachable panic in CRL parsing.
    # EXOCHAIN does not configure CRL parsing on owned TLS paths.
    { id = "RUSTSEC-2026-0104", reason = "workspace does not configure CRL parsing on owned TLS paths" },
]

# ---------------------------------------------------------------------------
# Licenses — Apache-2.0 is the workspace license.
# We allow permissive licenses compatible with Apache-2.0.
# All non-listed licenses are denied by default (v2 behavior).
# ---------------------------------------------------------------------------
[licenses]
# Confidence threshold for license detection
confidence-threshold = 0.8

allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    # MPL-2.0 is file-level copyleft, compatible with Apache-2.0 for combined works
    # Required by: ascii_utils (via async-graphql), fast_chemail (via async-graphql)
    "MPL-2.0",
]

# Some crates have non-standard license expressions
exceptions = []

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

# ---------------------------------------------------------------------------
# Bans — prevent problematic crates
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
# External wildcard dependency requirements weaken the supply-chain gate.
# Private workspace path dependencies are the only allowed wildcard form.
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"

deny = [
    # No OpenSSL — we use pure-Rust crypto (ed25519-dalek, blake3)
    { crate = "openssl-sys", wrappers = [] },
    { crate = "openssl", wrappers = [] },
]

# ---------------------------------------------------------------------------
# Sources — only allow crates.io and our own git repos
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
