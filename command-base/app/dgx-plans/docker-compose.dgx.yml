# ════════════════════════════════════════════════════════════════
# docker-compose.dgx.yml — Command Base on NVIDIA DGX Spark
# Target: Ubuntu 24.04, ARM64/aarch64 (GB10 Grace Blackwell)
# Generated by Onyx (CTO) — 2026-04-04
#
# USAGE:
#   deploy-to-dgx.sh copies this file to the DGX as docker-compose.yml
#   Manual: cp docker-compose.dgx.yml /opt/command-base/app/docker-compose.yml
#
# NOTES:
#   - Port bound to 127.0.0.1 only (nginx sits in front on 80/443)
#   - host.docker.internal resolves to DGX host IP (for vLLM + Ollama)
#   - tini as PID 1 handles SIGTERM and reaps zombie Claude subprocesses
#   - better-sqlite3 requires node:20-slim (glibc) — NOT alpine
# ════════════════════════════════════════════════════════════════
version: "3.9"

services:
  command-base:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: command-base:latest
    container_name: command-base
    restart: unless-stopped

    ports:
      # Bind to loopback only — nginx proxies 80/443 to here.
      # IMPORTANT: 127.0.0.1: prefix prevents Docker from bypassing ufw
      # and exposing port 3000 directly to the network.
      - "127.0.0.1:3000:3000"

    environment:
      # ── Core ────────────────────────────────────────────────────
      NODE_ENV: production
      PORT: "3000"
      TRUST_PROXY: "1"

      # ── Paths (bind-mounted volumes below) ──────────────────────
      DB_PATH: /data/the_team.db
      BACKUP_DIR: /data/backups
      INBOX_PATH: /data/inbox
      OUTBOX_PATH: /data/outbox

      # ── Claude API (from host .env file or DGX environment) ─────
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # ── Local LLM: Nemotron Cascade 2 via vLLM on port 8901 ─────
      # vLLM runs on the DGX host (outside Docker).
      # host.docker.internal is resolved via extra_hosts below.
      LOCAL_LLM_ENABLED: ${LOCAL_LLM_ENABLED:-true}
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://host.docker.internal:8901/v1}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-nvidia/Nemotron-Cascade-2-15B}
      LOCAL_LLM_TIMEOUT_MS: ${LOCAL_LLM_TIMEOUT_MS:-120000}

      # ── Spawn mode ───────────────────────────────────────────────
      # hybrid = Claude CLI for agentic/tool tasks, local LLM for text
      SPAWN_MODE: ${SPAWN_MODE:-hybrid}

      # ── SQLite tuning ────────────────────────────────────────────
      DB_BUSY_TIMEOUT: ${DB_BUSY_TIMEOUT:-10000}
      DB_CACHE_SIZE: ${DB_CACHE_SIZE:--131072}
      DB_MMAP_SIZE: ${DB_MMAP_SIZE:-536870912}

      # ── Claude CLI ───────────────────────────────────────────────
      HOME: /root

    volumes:
      # ── Persistent data (bind-mounted from host paths) ───────────
      #    Bind mounts instead of named volumes = visible on host FS,
      #    easy to back up, inspect, and restore without Docker commands.

      # SQLite database — lives outside the container
      - /opt/command-base/data/db:/data:rw

      # Uploaded files
      - /opt/command-base/data/uploads:/app/uploads:rw

      # Inbox / outbox (Max's task dropboxes)
      - /opt/command-base/data/inbox:/data/inbox:rw
      - /opt/command-base/data/outbox:/data/outbox:rw

      # ── Claude CLI auth ──────────────────────────────────────────
      # Mount claude config directory (rw — CLI writes session tokens)
      - /opt/command-base/data/claude-config:/root/.claude:rw
      # Mount .claude.json auth file from config directory
      # (entrypoint.sh copies it to /root/.claude.json on startup)
      - /opt/command-base/data/claude-config/.claude.json:/host-home/.claude.json:ro

      # ── Claude CLI binary (read-only from host) ──────────────────
      # Install claude CLI on DGX host first:
      #   npm install -g @anthropic-ai/claude-code
      # Then it's available at /usr/local/bin/claude
      - /usr/local/bin/claude:/usr/local/bin/claude:ro

    # ── Network: host.docker.internal resolves to DGX host IP ──────
    # Required for the app to reach vLLM (port 8901) and Ollama (port 11434)
    # running on the DGX host from inside this container.
    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - command-base-net

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    # ── Resource limits ─────────────────────────────────────────────
    # The DGX Spark has 128 GB unified memory. Reserve most for the
    # LLM models (vLLM + Ollama). The Node.js app itself runs fine
    # within 2–4 GB even under full load with 68 agent spawns.
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 512m

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

networks:
  command-base-net:
    driver: bridge
