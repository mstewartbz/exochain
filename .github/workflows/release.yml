# EXOCHAIN Release Workflow
#
# Requires all CI gates to pass plus release-environment approval.
# Non-dry-run releases must be anchored to an existing signed tag.
# Produces deterministic release artifacts with CycloneDX SBOMs and SLSA attestations.

name: EXOCHAIN Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true
        type: string
      dry_run:
        description: "Dry run (skip publish)"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_TIMEOUT: "120"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  # -----------------------------------------------------------------------
  # Run full CI pipeline first
  # -----------------------------------------------------------------------
  ci:
    name: "Run CI Pipeline"
    uses: ./.github/workflows/ci.yml

  # -----------------------------------------------------------------------
  # Validate untrusted workflow-dispatch inputs before release jobs consume them
  # -----------------------------------------------------------------------
  validate-release-inputs:
    name: "Validate Release Inputs"
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.validate.outputs.version }}
      tag: ${{ steps.validate.outputs.tag }}
    steps:
      - name: Validate release version
        id: validate
        env:
          RELEASE_VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="$RELEASE_VERSION_INPUT"
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z-]*(\.[0-9A-Za-z][0-9A-Za-z-]*)*)?$ ]]; then
            echo "Invalid release version: expected major.minor.patch with optional prerelease suffix." >&2
            exit 1
          fi
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'tag=v%s\n' "$version" >> "$GITHUB_OUTPUT"

  # -----------------------------------------------------------------------
  # Manual approval gate
  # -----------------------------------------------------------------------
  approve:
    name: "Maintainer Approval"
    runs-on: ubuntu-latest
    needs: [ci, validate-release-inputs]
    environment: release
    steps:
      - name: Approval confirmed
        env:
          RELEASE_VERSION: ${{ needs.validate-release-inputs.outputs.version }}
        run: printf 'Release %s approved by maintainer.\n' "$RELEASE_VERSION"

  # -----------------------------------------------------------------------
  # Signed tag gate for real releases
  # -----------------------------------------------------------------------
  verify-signed-tag:
    name: "Verify Signed Release Tag"
    runs-on: ubuntu-latest
    needs: [approve, validate-release-inputs]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Require signed tag for non-dry-run release
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          RELEASE_TAG: ${{ needs.validate-release-inputs.outputs.tag }}
          EXOCHAIN_RELEASE_SIGNING_PUBLIC_KEY_ASC: ${{ vars.EXOCHAIN_RELEASE_SIGNING_PUBLIC_KEY_ASC }}
          EXOCHAIN_RELEASE_SIGNING_FINGERPRINT: ${{ vars.EXOCHAIN_RELEASE_SIGNING_FINGERPRINT }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            echo "Dry run: signed tag requirement is skipped."
            exit 0
          fi

          signing_key_fingerprint="$(printf '%s' "$EXOCHAIN_RELEASE_SIGNING_FINGERPRINT" | tr -d '[:space:]' | tr '[:lower:]' '[:upper:]')"
          if ! [[ "$signing_key_fingerprint" =~ ^[0-9A-F]{40}$ ]]; then
            echo "EXOCHAIN_RELEASE_SIGNING_FINGERPRINT must be a 40-character OpenPGP fingerprint." >&2
            exit 1
          fi
          if [ -z "$EXOCHAIN_RELEASE_SIGNING_PUBLIC_KEY_ASC" ]; then
            echo "EXOCHAIN_RELEASE_SIGNING_PUBLIC_KEY_ASC repository variable is required." >&2
            exit 1
          fi

          GNUPGHOME="$(mktemp -d)"
          export GNUPGHOME
          chmod 700 "$GNUPGHOME"
          trap 'rm -rf "$GNUPGHOME"' EXIT
          printf '%s\n' "$EXOCHAIN_RELEASE_SIGNING_PUBLIC_KEY_ASC" | gpg --batch --import

          imported_fingerprint="$(gpg --batch --with-colons --fingerprint "$signing_key_fingerprint" | awk -F: '/^fpr:/ { print toupper($10); exit }')"
          if [ "$imported_fingerprint" != "$signing_key_fingerprint" ]; then
            echo "Imported release signing public key does not match EXOCHAIN_RELEASE_SIGNING_FINGERPRINT." >&2
            exit 1
          fi

          git fetch --tags --force
          git rev-parse "refs/tags/${RELEASE_TAG}" >/dev/null
          git tag -v "${RELEASE_TAG}"

  # -----------------------------------------------------------------------
  # Build release artifacts
  # -----------------------------------------------------------------------
  release-build:
    name: "Build Release Artifacts"
    runs-on: ubuntu-latest
    needs: [approve, verify-signed-tag, validate-release-inputs]
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - name: Resolve release source ref
        id: release-ref
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          RELEASE_TAG: ${{ needs.validate-release-inputs.outputs.tag }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            printf 'ref=%s\n' "${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            printf 'ref=refs/tags/%s\n' "$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ steps.release-ref.outputs.ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release
        run: bash tools/ci_cargo_retry.sh cargo build --workspace --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package artifacts
        env:
          RELEASE_VERSION: ${{ needs.validate-release-inputs.outputs.version }}
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/libexo_*.rlib dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/libexo_*.so dist/ 2>/dev/null || true
          tar czf "exochain-${RELEASE_VERSION}-${{ matrix.target }}.tar.gz" -C dist .

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: exochain-${{ needs.validate-release-inputs.outputs.version }}-${{ matrix.target }}
          path: exochain-${{ needs.validate-release-inputs.outputs.version }}-${{ matrix.target }}.tar.gz

  # -----------------------------------------------------------------------
  # Generate SBOM and SLSA provenance attestation
  #
  # Replaces the previous hand-rolled provenance.json with:
  #   1. CycloneDX SBOM (cargo-cyclonedx) — machine-readable component graph
  #   2. SLSA Level 2 build provenance (actions/attest-build-provenance) —
  #      cryptographically signed via GitHub OIDC / Sigstore keyless flow,
  #      stored in Rekor transparency log for non-repudiation.
  #
  # Verify after release:
  #   gh attestation verify exochain-<VERSION>-<TARGET>.tar.gz \
  #     --owner exochain
  # -----------------------------------------------------------------------
  sbom-and-attest:
    name: "SBOM + SLSA Attestation"
    runs-on: ubuntu-latest
    needs: [release-build, validate-release-inputs]
    if: ${{ !inputs.dry_run }}
    permissions:
      attestations: write  # write SLSA attestations to repo
      id-token: write      # GitHub OIDC token for keyless Sigstore signing

    steps:
      - name: Resolve release source ref
        id: release-ref
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          RELEASE_TAG: ${{ needs.validate-release-inputs.outputs.tag }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            printf 'ref=%s\n' "${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            printf 'ref=refs/tags/%s\n' "$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ steps.release-ref.outputs.ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      - name: Download all build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts

      - name: Collect release archives
        run: |
          mkdir -p release-archives
          find artifacts -name '*.tar.gz' -exec cp {} release-archives/ \;
          echo "Collected archives:"
          ls -lh release-archives/

      # ── SBOM ─────────────────────────────────────────────────────────────
      - name: Install cargo-cyclonedx
        run: bash tools/ci_cargo_retry.sh cargo install cargo-cyclonedx --version 0.5.9 --locked

      - name: Generate CycloneDX SBOM
        env:
          RELEASE_VERSION: ${{ needs.validate-release-inputs.outputs.version }}
        run: |
          cargo cyclonedx -f json --workspace
          # Rename outputs to include version for unambiguous identification
          for f in *.cdx.json; do
            mv "$f" "exochain-${RELEASE_VERSION}-${f}"
          done
          echo "SBOM artifacts:"
          ls -lh "exochain-${RELEASE_VERSION}"-*.cdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom-${{ needs.validate-release-inputs.outputs.version }}
          path: exochain-${{ needs.validate-release-inputs.outputs.version }}-*.cdx.json
          retention-days: 2555  # 7 years — governance software retention policy

      # ── SLSA provenance attestation ──────────────────────────────────────
      - name: Attest build provenance (SLSA Level 2)
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45
        with:
          subject-path: release-archives/*.tar.gz

  # -----------------------------------------------------------------------
  # Publish to crates.io (unless dry run)
  # -----------------------------------------------------------------------
  publish:
    name: "Publish to crates.io"
    runs-on: ubuntu-latest
    needs: [release-build, sbom-and-attest, validate-release-inputs]
    if: ${{ !inputs.dry_run }}
    steps:
      - name: Resolve release source ref
        id: release-ref
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          RELEASE_TAG: ${{ needs.validate-release-inputs.outputs.tag }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            printf 'ref=%s\n' "${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            printf 'ref=refs/tags/%s\n' "$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ steps.release-ref.outputs.ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          CRATES=(
            exo-core
            exo-identity
            exo-consent
            exo-authority
            exo-dag
            exo-proofs
            exo-gatekeeper
            exo-governance
            exo-escalation
            exo-legal
            exo-tenant
            exo-api
            exo-gateway
            decision-forum
            exochain-wasm
          )
          for crate in "${CRATES[@]}"; do
            echo "Publishing $crate..."
            cargo publish -p "$crate" --allow-dirty
            # crates.io index propagation delay
            sleep 30
          done

  # -----------------------------------------------------------------------
  # Publish versioned WASM package to npm (unless dry run)
  # -----------------------------------------------------------------------
  publish-wasm-npm:
    name: "Package and publish WASM npm package"
    runs-on: ubuntu-latest
    needs: [approve, verify-signed-tag, validate-release-inputs]
    permissions:
      id-token: write
    steps:
      - name: Resolve release source ref
        id: release-ref
        env:
          DRY_RUN: ${{ inputs.dry_run }}
          RELEASE_TAG: ${{ needs.validate-release-inputs.outputs.tag }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            printf 'ref=%s\n' "${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            printf 'ref=refs/tags/%s\n' "$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ steps.release-ref.outputs.ref }}
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install wasm-pack
        run: bash tools/ci_cargo_retry.sh cargo install wasm-pack --version 0.14.0 --locked

      - name: Build scoped WASM npm package
        run: bash tools/ci_cargo_retry.sh wasm-pack build crates/exochain-wasm --target nodejs --scope exochain --out-dir ../../packages/exochain-wasm/wasm

      - name: Prepare scoped WASM npm package
        run: |
          cp LICENSE packages/exochain-wasm/wasm/LICENSE
          node tools/prepare_wasm_npm_package.mjs packages/exochain-wasm/wasm

      - name: Verify WASM npm package release metadata
        env:
          RELEASE_VERSION: ${{ needs.validate-release-inputs.outputs.version }}
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('packages/exochain-wasm/wasm/package.json', 'utf8'));
          if (manifest.name !== '@exochain/exochain-wasm') {
            throw new Error(`unexpected WASM package name ${manifest.name}`);
          }
          if (manifest.version !== process.env.RELEASE_VERSION) {
            throw new Error(`WASM package version ${manifest.version} must match release ${process.env.RELEASE_VERSION}`);
          }
          if (!manifest.files.includes('LICENSE')) {
            throw new Error('WASM package must include LICENSE in npm files');
          }
          NODE

      - name: Dry-pack WASM npm package
        run: npm pack --dry-run
        working-directory: packages/exochain-wasm/wasm

      - name: Publish WASM npm package
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
        working-directory: packages/exochain-wasm/wasm

  # -----------------------------------------------------------------------
  # Create GitHub Release
  # -----------------------------------------------------------------------
  github-release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    needs: [release-build, sbom-and-attest, publish, publish-wasm-npm, validate-release-inputs]
    if: ${{ !inputs.dry_run }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ needs.validate-release-inputs.outputs.tag }}
          name: "EXOCHAIN ${{ needs.validate-release-inputs.outputs.tag }}"
          body: |
            ## EXOCHAIN ${{ needs.validate-release-inputs.outputs.tag }}

            Constitutional trust fabric release.

            All CR-001 Section 8.8 quality gates passed:
            - Build: release profile with LTO
            - Tests: full workspace (debug + release)
            - Coverage: scoped 90% line coverage gate
            - Lint: clippy with float_arithmetic deny
            - Format: rustfmt verified
            - Audit: policy-enforced with documented advisory exceptions
            - Deny: license and advisory policy verified
            - Documentation: builds without warnings
            - SBOM: CycloneDX component graph generated

            ### Supply-Chain Verification

            Build provenance is attested via GitHub's SLSA Level 2 pipeline and stored
            in the Sigstore Rekor transparency log. Verify any release archive:

            ```sh
            gh attestation verify exochain-${{ needs.validate-release-inputs.outputs.version }}-<TARGET>.tar.gz \
              --owner exochain
            ```

            CycloneDX SBOMs (`.cdx.json`) are attached below for each workspace crate.
            They can be ingested by any SBOM-aware toolchain (Dependency-Track, Grype,
            Trivy, etc.).
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.cdx.json
          draft: false
