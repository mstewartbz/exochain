# EXOCHAIN Release Workflow
#
# Requires all CI gates to pass plus release-environment approval.
# Non-dry-run releases must be anchored to an existing signed tag.
# Produces deterministic release artifacts with CycloneDX SBOMs and SLSA attestations.

name: EXOCHAIN Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true
        type: string
      dry_run:
        description: "Dry run (skip publish)"
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # -----------------------------------------------------------------------
  # Run full CI pipeline first
  # -----------------------------------------------------------------------
  ci:
    name: "Run CI Pipeline"
    uses: ./.github/workflows/ci.yml

  # -----------------------------------------------------------------------
  # Manual approval gate
  # -----------------------------------------------------------------------
  approve:
    name: "Maintainer Approval"
    runs-on: ubuntu-latest
    needs: ci
    environment: release
    steps:
      - name: Approval confirmed
        run: echo "Release ${{ inputs.version }} approved by maintainer."

  # -----------------------------------------------------------------------
  # Signed tag gate for real releases
  # -----------------------------------------------------------------------
  verify-signed-tag:
    name: "Verify Signed Release Tag"
    runs-on: ubuntu-latest
    needs: approve
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Require signed tag for non-dry-run release
        run: |
          set -euo pipefail
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Dry run: signed tag requirement is skipped."
            exit 0
          fi

          tag="v${{ inputs.version }}"
          git fetch --tags --force
          git rev-parse "refs/tags/${tag}" >/dev/null
          git tag -v "${tag}"

  # -----------------------------------------------------------------------
  # Build release artifacts
  # -----------------------------------------------------------------------
  release-build:
    name: "Build Release Artifacts"
    runs-on: ubuntu-latest
    needs: [approve, verify-signed-tag]
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release
        run: cargo build --workspace --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package artifacts
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/libexo_*.rlib dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/libexo_*.so dist/ 2>/dev/null || true
          tar czf exochain-${{ inputs.version }}-${{ matrix.target }}.tar.gz -C dist .

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: exochain-${{ inputs.version }}-${{ matrix.target }}
          path: exochain-${{ inputs.version }}-${{ matrix.target }}.tar.gz

  # -----------------------------------------------------------------------
  # Generate SBOM and SLSA provenance attestation
  #
  # Replaces the previous hand-rolled provenance.json with:
  #   1. CycloneDX SBOM (cargo-cyclonedx) — machine-readable component graph
  #   2. SLSA Level 2 build provenance (actions/attest-build-provenance) —
  #      cryptographically signed via GitHub OIDC / Sigstore keyless flow,
  #      stored in Rekor transparency log for non-repudiation.
  #
  # Verify after release:
  #   gh attestation verify exochain-<VERSION>-<TARGET>.tar.gz \
  #     --owner exochain
  # -----------------------------------------------------------------------
  sbom-and-attest:
    name: "SBOM + SLSA Attestation"
    runs-on: ubuntu-latest
    needs: release-build
    permissions:
      attestations: write  # write SLSA attestations to repo
      id-token: write      # GitHub OIDC token for keyless Sigstore signing

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae

      - name: Download all build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts

      - name: Collect release archives
        run: |
          mkdir -p release-archives
          find artifacts -name '*.tar.gz' -exec cp {} release-archives/ \;
          echo "Collected archives:"
          ls -lh release-archives/

      # ── SBOM ─────────────────────────────────────────────────────────────
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --version 0.5.9 --locked

      - name: Generate CycloneDX SBOM
        run: |
          cargo cyclonedx -f json --workspace
          # Rename outputs to include version for unambiguous identification
          for f in *.cdx.json; do
            mv "$f" "exochain-${{ inputs.version }}-${f}"
          done
          echo "SBOM artifacts:"
          ls -lh exochain-${{ inputs.version }}-*.cdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom-${{ inputs.version }}
          path: exochain-${{ inputs.version }}-*.cdx.json
          retention-days: 2555  # 7 years — governance software retention policy

      # ── SLSA provenance attestation ──────────────────────────────────────
      - name: Attest build provenance (SLSA Level 2)
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45
        with:
          subject-path: release-archives/*.tar.gz

  # -----------------------------------------------------------------------
  # Publish to crates.io (unless dry run)
  # -----------------------------------------------------------------------
  publish:
    name: "Publish to crates.io"
    runs-on: ubuntu-latest
    needs: [release-build, sbom-and-attest]
    if: ${{ !inputs.dry_run }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          CRATES=(
            exo-core
            exo-identity
            exo-consent
            exo-authority
            exo-dag
            exo-proofs
            exo-gatekeeper
            exo-governance
            exo-escalation
            exo-legal
            exo-tenant
            exo-api
            exo-gateway
            decision-forum
            exochain-wasm
          )
          for crate in "${CRATES[@]}"; do
            echo "Publishing $crate..."
            cargo publish -p "$crate" --allow-dirty || {
              echo "Warning: $crate publish failed (may already be published)"
            }
            # crates.io index propagation delay
            sleep 30
          done

  # -----------------------------------------------------------------------
  # Create GitHub Release
  # -----------------------------------------------------------------------
  github-release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    needs: [release-build, sbom-and-attest]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: v${{ inputs.version }}
          name: "EXOCHAIN v${{ inputs.version }}"
          body: |
            ## EXOCHAIN v${{ inputs.version }}

            Constitutional trust fabric release.

            All CR-001 Section 8.8 quality gates passed:
            - Build: release profile with LTO
            - Tests: full workspace (debug + release)
            - Coverage: scoped 90% line coverage gate
            - Lint: clippy with float_arithmetic deny
            - Format: rustfmt verified
            - Audit: policy-enforced with documented advisory exceptions
            - Deny: license and advisory policy verified
            - Documentation: builds without warnings
            - SBOM: CycloneDX component graph generated

            ### Supply-Chain Verification

            Build provenance is attested via GitHub's SLSA Level 2 pipeline and stored
            in the Sigstore Rekor transparency log. Verify any release archive:

            ```sh
            gh attestation verify exochain-${{ inputs.version }}-<TARGET>.tar.gz \
              --owner exochain
            ```

            CycloneDX SBOMs (`.cdx.json`) are attached below for each workspace crate.
            They can be ingested by any SBOM-aware toolchain (Dependency-Track, Grype,
            Trivy, etc.).
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.cdx.json
          draft: ${{ inputs.dry_run }}
