# LiveSafe application CI (path-scoped).
#
# The livesafe/ subtree is a proprietary Node/Vite application, not part of the
# Apache-2.0 Rust workspace, so it needs its own gate. This workflow only fires
# on changes under livesafe/ and validates that the deployable artifacts build
# and the TypeScript boundary type-checks. It is intentionally separate from the
# constitutional Rust CI (ci.yml) and its all-gates aggregation.
#
# Out of scope here: the DB-backed vitest integration suite (tests/**), which
# requires a live Postgres and the running server. That belongs in a dedicated
# service-integration job, not this build gate.

name: LiveSafe CI

on:
  push:
    paths:
      - 'livesafe/**'
      - '.github/workflows/livesafe-ci.yml'
  pull_request:
    paths:
      - 'livesafe/**'
      - '.github/workflows/livesafe-ci.yml'

defaults:
  run:
    working-directory: livesafe

jobs:
  build:
    name: "LiveSafe — Build & Typecheck"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - name: Install root dev dependencies
        run: npm ci
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck
      - name: Build client (production artifact)
        run: |
          cd client
          npm ci
          npm run build
      - name: Build responder
        run: |
          cd responder
          npm ci
          npm run build
      - name: Install server dependencies (resolve check)
        run: |
          cd server
          npm ci
