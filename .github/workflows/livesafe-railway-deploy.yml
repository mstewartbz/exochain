name: LiveSafe Railway Deploy

on:
  push:
    branches:
      - main
    paths:
      - "livesafe/**"
      - "crates/exo-avc/**"
      - "crates/exo-node/**"
      - "railway.json"
      - "livesafe/railway.json"
      - "scripts/livesafe-railway-smoke.sh"
      - ".github/workflows/livesafe-railway-deploy.yml"
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Railway environment to promote to"
        required: true
        type: choice
        options:
          - staging
          - production
      commit_sha:
        description: "Commit SHA to deploy; defaults to the workflow SHA"
        required: false
        type: string
      expected_public_claims_allowed:
        description: "Expected public claims state for staging/production smoke"
        required: false
        type: choice
        default: "false"
        options:
          - "false"
          - "true"

permissions:
  contents: read

env:
  RAILWAY_PROJECT_ID: 372de75b-5f44-46c2-ab70-3c3185b5d81e
  RAILWAY_DEVELOPMENT_ENVIRONMENT_ID: 3dc06fb6-c3df-4fe4-8807-0da0e62e4028
  RAILWAY_STAGING_ENVIRONMENT_ID: a223bc12-fbe4-430f-abce-8e3ee7c9abd3
  RAILWAY_PRODUCTION_ENVIRONMENT_ID: 1e5153e1-15f4-4447-bf7c-029af33927fb
  EXOCHAIN_NODE_SERVICE_ID: 4d8384d3-be5d-48d6-a914-97eb6133e53d
  LIVESAFE_SERVICE_ID: 8ed3bd1a-f872-4e22-9a39-ac38953fae26
  LIVESAFE_RAILWAY_SMOKE_TIMEOUT_SECONDS: "1200"

jobs:
  verify-livesafe:
    name: Verify LiveSafe deployable artifact
    uses: ./.github/workflows/livesafe-ci.yml
    with:
      commit_sha: ${{ inputs.commit_sha || github.sha }}

  deploy-development:
    name: Deploy LiveSafe development
    if: github.event_name == 'push'
    needs: verify-livesafe
    runs-on: ubuntu-latest
    environment: livesafe-development
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.65.0
      - name: Deploy exochain-node to development
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_DEVELOPMENT_TOKEN }}
        run: |
          railway up . --path-as-root --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_DEVELOPMENT_ENVIRONMENT_ID" --service "$EXOCHAIN_NODE_SERVICE_ID" --detach --json -m "development exochain-node ${GITHUB_SHA}"
      - name: Deploy livesafe to development
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_DEVELOPMENT_TOKEN }}
        run: |
          railway up . --path-as-root --project "$RAILWAY_PROJECT_ID" --environment "$RAILWAY_DEVELOPMENT_ENVIRONMENT_ID" --service "$LIVESAFE_SERVICE_ID" --detach --json -m "development livesafe ${GITHUB_SHA}"
      - name: Smoke development
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_DEVELOPMENT_TOKEN }}
        run: scripts/livesafe-railway-smoke.sh "development"

  deploy-staging:
    name: Promote LiveSafe staging
    if: github.event_name == 'workflow_dispatch' && inputs.target_environment == 'staging'
    needs: verify-livesafe
    runs-on: ubuntu-latest
    environment: livesafe-staging
    env:
      TARGET_ENVIRONMENT: staging
      TARGET_ENVIRONMENT_ID: a223bc12-fbe4-430f-abce-8e3ee7c9abd3
      LIVESAFE_EXPECT_PUBLIC_CLAIMS_ALLOWED: ${{ inputs.expected_public_claims_allowed || 'false' }}
    steps:
      - name: Resolve safe main commit
        id: safe-ref
        env:
          REQUESTED_COMMIT_SHA: ${{ inputs.commit_sha || github.sha }}
        run: |
          set -euo pipefail
          if [[ ! "$REQUESTED_COMMIT_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "manual Railway promotions require a full lowercase commit SHA" >&2
            exit 1
          fi
          safe_repo="$RUNNER_TEMP/livesafe-safe-ref.git"
          git init --bare "$safe_repo"
          git -C "$safe_repo" remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git -C "$safe_repo" fetch --no-tags origin "$REQUESTED_COMMIT_SHA"
          git -C "$safe_repo" fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          git -C "$safe_repo" cat-file -e "$REQUESTED_COMMIT_SHA^{commit}"
          if ! git -C "$safe_repo" merge-base --is-ancestor "$REQUESTED_COMMIT_SHA" refs/remotes/origin/main; then
            echo "commit_sha must be reachable from origin/main before Railway secrets are exposed" >&2
            exit 1
          fi
          echo "sha=$REQUESTED_COMMIT_SHA" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ steps.safe-ref.outputs.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.65.0
      - name: Promote exochain-node
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}
          SAFE_DEPLOY_SHA: ${{ steps.safe-ref.outputs.sha }}
        run: |
          railway up . --path-as-root --project "$RAILWAY_PROJECT_ID" --environment "$TARGET_ENVIRONMENT_ID" --service "$EXOCHAIN_NODE_SERVICE_ID" --detach --json -m "${TARGET_ENVIRONMENT} exochain-node ${SAFE_DEPLOY_SHA}"
      - name: Promote livesafe
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}
          SAFE_DEPLOY_SHA: ${{ steps.safe-ref.outputs.sha }}
        run: |
          railway up . --path-as-root --project "$RAILWAY_PROJECT_ID" --environment "$TARGET_ENVIRONMENT_ID" --service "$LIVESAFE_SERVICE_ID" --detach --json -m "${TARGET_ENVIRONMENT} livesafe ${SAFE_DEPLOY_SHA}"
      - name: Smoke staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}
        run: scripts/livesafe-railway-smoke.sh "$TARGET_ENVIRONMENT"

  deploy-production:
    name: Promote LiveSafe production
    if: github.event_name == 'workflow_dispatch' && inputs.target_environment == 'production'
    needs: verify-livesafe
    runs-on: ubuntu-latest
    environment: livesafe-production
    env:
      TARGET_ENVIRONMENT: production
      TARGET_ENVIRONMENT_ID: 1e5153e1-15f4-4447-bf7c-029af33927fb
      LIVESAFE_EXPECT_PUBLIC_CLAIMS_ALLOWED: ${{ inputs.expected_public_claims_allowed || 'false' }}
    steps:
      - name: Resolve safe main commit
        id: safe-ref
        env:
          REQUESTED_COMMIT_SHA: ${{ inputs.commit_sha || github.sha }}
        run: |
          set -euo pipefail
          if [[ ! "$REQUESTED_COMMIT_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "manual Railway promotions require a full lowercase commit SHA" >&2
            exit 1
          fi
          safe_repo="$RUNNER_TEMP/livesafe-safe-ref.git"
          git init --bare "$safe_repo"
          git -C "$safe_repo" remote add origin "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git"
          git -C "$safe_repo" fetch --no-tags origin "$REQUESTED_COMMIT_SHA"
          git -C "$safe_repo" fetch --no-tags origin "+refs/heads/main:refs/remotes/origin/main"
          git -C "$safe_repo" cat-file -e "$REQUESTED_COMMIT_SHA^{commit}"
          if ! git -C "$safe_repo" merge-base --is-ancestor "$REQUESTED_COMMIT_SHA" refs/remotes/origin/main; then
            echo "commit_sha must be reachable from origin/main before Railway secrets are exposed" >&2
            exit 1
          fi
          echo "sha=$REQUESTED_COMMIT_SHA" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ steps.safe-ref.outputs.sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
      - name: Install Railway CLI
        run: npm install -g @railway/cli@4.65.0
      - name: Promote exochain-node
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_TOKEN }}
          SAFE_DEPLOY_SHA: ${{ steps.safe-ref.outputs.sha }}
        run: |
          railway up . --path-as-root --project "$RAILWAY_PROJECT_ID" --environment "$TARGET_ENVIRONMENT_ID" --service "$EXOCHAIN_NODE_SERVICE_ID" --detach --json -m "${TARGET_ENVIRONMENT} exochain-node ${SAFE_DEPLOY_SHA}"
      - name: Promote livesafe
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_TOKEN }}
          SAFE_DEPLOY_SHA: ${{ steps.safe-ref.outputs.sha }}
        run: |
          railway up . --path-as-root --project "$RAILWAY_PROJECT_ID" --environment "$TARGET_ENVIRONMENT_ID" --service "$LIVESAFE_SERVICE_ID" --detach --json -m "${TARGET_ENVIRONMENT} livesafe ${SAFE_DEPLOY_SHA}"
      - name: Smoke production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_TOKEN }}
        run: scripts/livesafe-railway-smoke.sh "$TARGET_ENVIRONMENT"
