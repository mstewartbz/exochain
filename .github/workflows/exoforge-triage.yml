# ExoForge Issue Triage
#
# When an issue is created or labeled with `exoforge:triage`,
# this workflow posts it to the ExoForge ingestion endpoint
# to enter the self-improvement cycle.
#
# The cycle: Triage -> Council Review -> Implementation -> Validation -> PR

name: ExoForge Issue Triage

on:
  issues:
    types: [opened, labeled]

jobs:
  triage:
    name: Ingest issue into ExoForge
    if: contains(github.event.issue.labels.*.name, 'exoforge:triage')
    runs-on: ubuntu-latest
    steps:
      - name: Prepare feedback payload
        id: payload
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_LABELS_JSON: ${{ toJSON(github.event.issue.labels.*.name) }}
        run: |
          # Keep issue fields in environment variables. Public issue content is
          # untrusted and must not be interpolated into shell source.
          printf '%s\n' "$ISSUE_TITLE" >/dev/null
          printf '%s\n' "$ISSUE_URL" >/dev/null
          printf '%s\n' "$ISSUE_AUTHOR" >/dev/null

          # Determine type from labels
          TYPE="suggestion"
          if printf '%s' "$ISSUE_LABELS_JSON" | jq -e 'index("bug") != null' >/dev/null; then
            TYPE="bug"
          elif printf '%s' "$ISSUE_LABELS_JSON" | jq -e 'index("enhancement") != null' >/dev/null; then
            TYPE="enhancement"
          fi

          {
            printf 'issue_number=%s\n' "$ISSUE_NUMBER"
            printf 'type=%s\n' "$TYPE"
          } >> "$GITHUB_OUTPUT"

      - name: Post to ExoForge ingestion
        if: ${{ vars.EXOFORGE_GATEWAY_URL != '' }}
        env:
          EXOFORGE_GATEWAY_URL: ${{ vars.EXOFORGE_GATEWAY_URL }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_LABELS_JSON: ${{ toJSON(github.event.issue.labels.*.name) }}
          ISSUE_TYPE: ${{ steps.payload.outputs.type }}
        run: |
          payload="$(jq -n \
            --arg widget "github-issue" \
            --arg page "github" \
            --arg type "$ISSUE_TYPE" \
            --arg message "$ISSUE_TITLE" \
            --arg issue_url "$ISSUE_URL" \
            --arg author "$ISSUE_AUTHOR" \
            --argjson issue_number "$ISSUE_NUMBER" \
            --argjson labels "$ISSUE_LABELS_JSON" \
            '{
              widget: $widget,
              page: $page,
              type: $type,
              message: $message,
              context: {
                issue_number: $issue_number,
                issue_url: $issue_url,
                author: $author,
                labels: $labels,
                body_preview: ""
              }
            }')"

          curl -sf -X POST "${EXOFORGE_GATEWAY_URL}/api/feedback" \
            -H "Content-Type: application/json" \
            --data-binary "$payload" \
            || echo "ExoForge gateway not reachable — issue queued for manual triage"

      - name: Add triage acknowledgment
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            **ExoForge Self-Improvement Cycle** activated for this issue.

            This issue will be processed through the governed pipeline:
            1. **Triage** — Severity, impact, and affected invariants classified
            2. **AI-IRB Council Review** — 5-panel review (Governance, Legal, Architecture, Security, Operations)
            3. **Implementation** — Autonomous code generation across the full stack
            4. **Constitutional Validation** — 8 invariants + 10 TNC controls verified
            5. **Pull Request** — Governed PR created for review

            Track progress at [ExoForge](https://github.com/exochain/exoforge).

            ---
            *Governed by the ExoChain Constitutional Framework*
