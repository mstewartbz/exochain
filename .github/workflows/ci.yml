# EXOCHAIN Constitutional CI
#
# Enforces CR-001 Section 8.8 quality gates.
# ALL gates must pass before any merge to main or release.
#
# Constitutional requirements enforced:
#   - Determinism: no floats, no HashMap, canonical serialization
#   - Clippy float_arithmetic = deny (workspace lint)
#   - Scoped 90%+ line coverage with explicit runtime-adapter exclusions
#   - Dependency audit gates with documented advisory exceptions
#   - License compliance (Apache-2.0; no copyleft contamination)

name: EXOCHAIN Constitutional CI
on:
  push:
  pull_request:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Determinism: force single-threaded codegen in CI to match release profile
  CARGO_BUILD_JOBS: "4"
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_TIMEOUT: "120"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  # -----------------------------------------------------------------------
  # Gate 1: Build
  # -----------------------------------------------------------------------
  build:
    name: "Gate 1 — Build (release)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Build workspace (release)
        run: bash tools/ci_cargo_retry.sh cargo build --workspace --release

  # -----------------------------------------------------------------------
  # Gate 2: Test
  # -----------------------------------------------------------------------
  test:
    name: "Gate 2 — Test"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Run all workspace tests
        run: cargo test --workspace
      - name: Run tests in release mode (determinism check)
        run: cargo test --workspace --release

  # -----------------------------------------------------------------------
  # Gate 3: Coverage (scoped 90%+ line coverage required)
  # -----------------------------------------------------------------------
  coverage:
    name: "Gate 3 — Coverage (scoped >= 90%)"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Coverage policy guard
        run: bash tools/test_coverage_policy.sh
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Install cargo-tarpaulin
        run: bash tools/ci_cargo_retry.sh cargo install cargo-tarpaulin --version 0.35.4 --locked
      - name: Run coverage
        # exochain-wasm: excluded — wasm bindings are exercised by the JS
        # bridge tests (Gate 21), not tarpaulin.
        # exochain-proofs: excluded — the entire crate is gated behind
        # `unaudited-pedagogical-proofs` (default OFF) after PR #106.
        # With the feature OFF, the crate compiles to refusal stubs that
        # tarpaulin correctly reports as 0% covered. Testing the gated
        # code belongs in a separate dedicated tarpaulin pass under
        # `--features unaudited-pedagogical-proofs`; it is not in scope
        # for the default workspace coverage gate.
        # The largest LLVM-instrumented test binaries can run close to
        # five minutes; keep runner variance out of the coverage claim.
        run: |
          cargo tarpaulin \
            --workspace \
            --exclude exochain-wasm \
            --exclude exochain-proofs \
            --out xml \
            --output-dir coverage \
            --engine llvm \
            --timeout 900 \
            --fail-under 90
      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-report
          path: coverage/cobertura.xml

  # -----------------------------------------------------------------------
  # Gate 4: Lint (clippy with constitutional denials)
  # -----------------------------------------------------------------------
  lint:
    name: "Gate 4 — Clippy Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Clippy (all workspace targets, deny all warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

  # -----------------------------------------------------------------------
  # Gate 5: Format
  # -----------------------------------------------------------------------
  format:
    name: "Gate 5 — Format Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@5b842231ba77f5c045dba54ac5560fed2db780e2
        with:
          toolchain: nightly
          components: rustfmt
      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

  # -----------------------------------------------------------------------
  # Gate 6: Audit (dependency vulnerabilities)
  # -----------------------------------------------------------------------
  audit:
    name: "Gate 6 — Cargo Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install cargo-audit
        run: bash tools/ci_cargo_retry.sh cargo install cargo-audit --version 0.22.1 --locked
      - name: Audit dependencies (strict — vulnerabilities, unsound, unmaintained)
        # Historically this denied all warning classes, including yanked.
        # Gate 6 denies the three classes we can act on immediately:
        # vulnerability, unsound, and unmaintained. Yanked advisories remain
        # warnings unless a separate vulnerability/unsound/unmaintained
        # advisory is attached.
        run: cargo audit --deny unsound --deny unmaintained
      - name: Audit ignore policy stays current
        run: bash tools/test_audit_ignore_policy.sh

  # -----------------------------------------------------------------------
  # Gate 7: Deny (license + advisory compliance)
  # -----------------------------------------------------------------------
  deny:
    name: "Gate 7 — Cargo Deny"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: EmbarkStudios/cargo-deny-action@5bb39ff5d5a0e94dc9e2dc94eced0c6129743a57
        with:
          command: check
      - name: Workspace dependency exact pin guard
        run: bash tools/test_security_critical_dependencies_pinned.sh

  # -----------------------------------------------------------------------
  # Gate 8: Documentation (must build without warnings)
  # -----------------------------------------------------------------------
  doc:
    name: "Gate 8 — Documentation"
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Build documentation
        run: cargo doc --workspace --no-deps

  # -----------------------------------------------------------------------
  # Gate 9: Repo Hygiene (no generated dirs, no secrets)
  # -----------------------------------------------------------------------
  hygiene:
    name: "Gate 9 — Repo Hygiene"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: No tracked node_modules
        run: |
          if git ls-files --error-unmatch node_modules/ 2>/dev/null; then
            echo "::error::node_modules/ is tracked in git"
            exit 1
          fi
          echo "✓ node_modules not tracked"
      - name: No tracked __pycache__
        run: |
          if git ls-files --error-unmatch '**/__pycache__/' 2>/dev/null; then
            echo "::error::__pycache__/ is tracked in git"
            exit 1
          fi
          echo "✓ __pycache__ not tracked"
      - name: No tracked build artifacts
        run: |
          if git ls-files --error-unmatch 'web/dist/' 'demo/web/dist/' 2>/dev/null; then
            echo "::error::build artifacts are tracked in git"
            exit 1
          fi
          echo "✓ build artifacts not tracked"
      - name: No .env files tracked
        run: |
          if git ls-files '*.env' '.env*' | grep -v '\.example$' | grep -q .; then
            echo "::error::.env files are tracked in git"
            exit 1
          fi
          echo "✓ no .env files tracked"
      - name: License consistency check
        run: |
          CARGO_LICENSE=$(grep '^license' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$CARGO_LICENSE" != "Apache-2.0" ]; then
            echo "::error::Cargo.toml license is '$CARGO_LICENSE', expected 'Apache-2.0'"
            exit 1
          fi
          if ! head -1 LICENSE | grep -qi "apache"; then
            echo "::error::LICENSE file does not appear to be Apache-2.0"
            exit 1
          fi
          echo "✓ License consistent: Apache-2.0"
      - name: No GAP stubs remaining in code (A-102)
        # Fails if any `STUB` marker referencing a GAP-NNN identifier
        # remains in a code file. Prevents a GAP from being marked closed
        # in GAP-REGISTRY.md while a stub still lives in the tree.
        run: bash tools/test_gap_stub_ci_guard.sh
      - name: GitHub Actions pinned to immutable SHAs
        run: bash tools/test_github_actions_pinned.sh
      - name: GitHub issue workflow trust boundary
        run: bash tools/test_github_issue_workflow_boundaries.sh
      - name: CI tool installer supply-chain hardening
        run: bash tools/test_ci_supply_chain_hardening.sh
      - name: Cross-platform target cache boundary
        run: bash tools/test_cross_platform_target_cache_boundary.sh
      - name: Core npm package supply-chain hardening
        run: bash tools/test_npm_core_package_hygiene.sh
      - name: Release workflow ref binding
        run: bash tools/test_release_workflow_ref_binding.sh
      - name: Release version input boundary
        run: bash tools/test_release_version_input_boundary.sh
      - name: Release signed-tag trust boundary
        run: bash tools/test_release_signed_tag_trust_boundary.sh
      - name: Release reusable CI boundary
        run: bash tools/test_release_reusable_ci_boundary.sh
      - name: Release SBOM boundary
        run: bash tools/test_release_sbom_boundary.sh
      - name: Release version alignment
        run: bash tools/test_release_version_alignment.sh
      - name: Release dry-run publication boundary
        run: bash tools/test_release_dry_run_boundaries.sh
      - name: Release publish completion boundary
        run: bash tools/test_release_publish_boundaries.sh
      - name: Crates.io release packaging boundary
        run: bash tools/test_cratesio_release_packaging.sh
      - name: WASM npm package boundary
        run: bash tools/test_wasm_npm_package_boundary.sh
      - name: Repo truth and public claims
        run: bash tools/test_repo_truth.sh
      - name: Sybil CLI secret boundary
        run: bash tools/test_sybil_cli_secret_boundaries.sh
      - name: Audit policy documentation truth
        run: bash tools/test_audit_policy_docs.sh
      - name: Consensus liveness documentation truth
        run: bash tools/test_consensus_liveness_docs.sh
      - name: CR-001 status consistency
        run: bash tools/test_cr001_status.sh
      - name: GAP registry truth
        run: bash tools/test_gap_registry_truth.sh
      - name: Systemic integrity claims
        run: bash tools/check_systemic_integrity_claims.sh
      - name: GAP Syntaxis YAML parse contract
        run: bash tools/test_gap_syntaxis_yaml_parse.sh
      - name: No orphan Rust modules
        run: bash tools/test_no_orphan_rust_modules.sh
      - name: Railway entrypoint ingress contract
        run: bash tools/test_railway_entrypoint_args.sh
      - name: Deployment readiness probes
        run: bash tools/test_deployment_readiness_probes.sh
      - name: Public route verifier portability
        run: bash tools/test_public_route_verifier_portability.sh
      - name: Docker production database feature contract
        run: bash tools/test_docker_production_db_feature.sh
      - name: Agent prompt boundary contract
        run: bash tools/test_agent_prompt_boundaries.sh
      - name: Agent workflow loop-bound contract
        run: bash tools/test_agent_workflow_bounds.sh
      - name: Archon AVC quality matrix guard
        run: bash tools/test_archon_avc_quality_matrix.sh
      - name: Syntaxis workflow input boundary
        run: bash tools/test_syntaxis_workflow_input_boundary.sh
      - name: Core fuzz target compile contract
        run: bash tools/test_core_fuzz_targets.sh

  # -----------------------------------------------------------------------
  # Gate 10: SBOM (dry-run generation — no upload, validates toolchain)
  # -----------------------------------------------------------------------
  sbom:
    name: "Gate 10 — SBOM Dry-Run"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Install cargo-cyclonedx
        run: bash tools/ci_cargo_retry.sh cargo install cargo-cyclonedx --version 0.5.9 --locked
      - name: Generate CycloneDX SBOM (validation only)
        run: cargo cyclonedx --manifest-path Cargo.toml --format json
      - name: Validate SBOM output
        run: |
          SBOM_COUNT=$(find . -name '*.cdx.json' -o -name '*bom*.json' | head -20 | wc -l)
          if [ "$SBOM_COUNT" -eq 0 ]; then
            echo "::error::SBOM generation produced no output files"
            exit 1
          fi
          echo "✓ CycloneDX SBOM generated successfully ($SBOM_COUNT files):"
          find . -name '*.cdx.json' -o -name '*bom*.json' | head -20
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom-ci-${{ github.sha }}
          path: |
            **/*.cdx.json
            **/bom*.json
          if-no-files-found: warn
          retention-days: 90

  # -----------------------------------------------------------------------
  # Gate 11: Unused Dependencies (cargo-machete)
  # -----------------------------------------------------------------------
  machete:
    name: "Gate 11 — Unused Dependencies (cargo-machete)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Install cargo-machete
        run: bash tools/ci_cargo_retry.sh cargo install cargo-machete --version 0.9.2 --locked
      - name: Check for unused dependencies
        run: cargo machete

  # -----------------------------------------------------------------------
  # Gate 12: Integration tests — runs on every gateway route PR
  #
  # Uses dorny/paths-filter to detect crates/exo-gateway/** changes.
  # The job always runs; the test step is skipped when no gateway files
  # changed so all-gates can include it unconditionally.
  # -----------------------------------------------------------------------
  integration-tests:
    name: "Gate 12 — Integration Tests (gateway)"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050
        id: filter
        with:
          filters: |
            gateway:
              - 'crates/exo-gateway/**'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        if: steps.filter.outputs.gateway == 'true'
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        if: steps.filter.outputs.gateway == 'true'
      - name: Run workspace integration tests
        if: steps.filter.outputs.gateway == 'true'
        run: cargo test --workspace --test '*'

  # -----------------------------------------------------------------------
  # Gate 13: DB-backed integration tests (production-db feature, live Postgres)
  # -----------------------------------------------------------------------
  integration-tests-db:
    name: "Gate 13 — DB Integration Tests (production-db)"
    runs-on: ubuntu-latest
    needs: build
    env:
      DATABASE_URL: postgres://exochain:test@localhost:5432/exochain_test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: DB-backed gateway CI guard
        run: bash tools/test_gateway_db_ci.sh
      - name: Start Postgres via docker compose
        run: docker compose -f docker-compose.ci.yml up -d
      - name: Wait for Postgres to be healthy
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -U exochain -d exochain_test && break
            echo "Waiting for postgres... ($i/30)"
            sleep 3
          done
          pg_isready -h localhost -U exochain -d exochain_test
      - name: Install sqlx-cli (postgres only, no default TLS)
        run: bash tools/ci_cargo_retry.sh cargo install sqlx-cli --version 0.8.6 --locked --no-default-features --features postgres,rustls
      - name: Run migrations
        run: sqlx migrate run --source crates/exo-gateway/migrations
      - name: Run DAG DB migration upgrade regression
        env:
          EXO_DAGDB_TEST_DATABASE_URL: ${{ env.DATABASE_URL }}
        run: cargo test -p exochain-dag-db-postgres --features postgres --test migration_contract pr708_migrator_upgrades_from_last_successful_deployed_ledger -- --nocapture
      - name: Run DB-backed gateway library tests
        run: cargo test -p exochain-gateway --lib --features production-db -- --test-threads=1
      - name: Run DB-backed integration tests
        run: cargo test --workspace --test '*' --features exochain-gateway/production-db
      - name: Stop Postgres
        if: always()
        run: docker compose -f docker-compose.ci.yml down

  # -----------------------------------------------------------------------
  # Gate 14: Multi-node consensus integration test
  #
  # Validates that the BFT consensus reactor, state sync, and P2P
  # networking all function correctly in exo-node.
  # -----------------------------------------------------------------------
  consensus-integration:
    name: "Gate 14 — Consensus Integration Tests"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050
        id: filter
        with:
          filters: |
            node:
              - 'crates/exo-node/**'
              - 'crates/exo-dag/**'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        if: steps.filter.outputs.node == 'true'
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        if: steps.filter.outputs.node == 'true'
      - name: Run exo-node unit and integration tests
        if: steps.filter.outputs.node == 'true'
        run: cargo test -p exochain-node
      - name: Run exo-dag consensus tests
        if: steps.filter.outputs.node == 'true'
        run: cargo test -p exochain-dag -- consensus

  # -----------------------------------------------------------------------
  # Gate 15: State sync and join test
  #
  # Verifies the sync engine, wire protocol, and DAG store functionality
  # work correctly for new node bootstrap.
  # -----------------------------------------------------------------------
  state-sync-integration:
    name: "Gate 15 — State Sync & Join Tests"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050
        id: filter
        with:
          filters: |
            sync:
              - 'crates/exo-node/**'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        if: steps.filter.outputs.sync == 'true'
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        if: steps.filter.outputs.sync == 'true'
      - name: Run sync engine tests
        if: steps.filter.outputs.sync == 'true'
        run: cargo test -p exochain-node -- sync
      - name: Run store tests
        if: steps.filter.outputs.sync == 'true'
        run: cargo test -p exochain-node -- store
      - name: Run wire protocol tests
        if: steps.filter.outputs.sync == 'true'
        run: cargo test -p exochain-node -- wire
      - name: Run metrics tests
        if: steps.filter.outputs.sync == 'true'
        run: cargo test -p exochain-node -- metrics

  # -----------------------------------------------------------------------
  # Gate 16: Cross-platform binary build
  #
  # Verifies the exochain binary compiles on all target platforms.
  # Does not run tests (that is Gate 14-15's job) — only build verification.
  # -----------------------------------------------------------------------
  cross-platform:
    name: "Gate 16 — Cross-Platform Build (${{ matrix.target }})"
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        with:
          key: gate16-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}
          workspaces: ". -> target/gate16-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}"
      - name: Isolate Cargo target dir
        run: echo "CARGO_TARGET_DIR=target/gate16-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}" >> "$GITHUB_ENV"
      - name: Build exochain binary
        run: bash tools/ci_cargo_retry.sh cargo build --release --bin exochain --target ${{ matrix.target }}
      - name: Upload binary artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: exochain-${{ matrix.target }}
          path: target/gate16-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}/${{ matrix.target }}/release/exochain
          retention-days: 30

  # -----------------------------------------------------------------------
  # Gate 17: 0dentity Module Coverage (≥ 80% line coverage)
  #
  # Scoped to crates/exo-node/src/zerodentity/** only.
  # Uses --include-files to restrict tarpaulin reporting to that subtree,
  # then fails if the measured line coverage falls below 80%.
  # -----------------------------------------------------------------------
  zerodentity-coverage:
    name: "Gate 17 — 0dentity Module Coverage (>= 80%)"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Install cargo-tarpaulin
        run: bash tools/ci_cargo_retry.sh cargo install cargo-tarpaulin --version 0.35.4 --locked
      - name: Run 0dentity module coverage
        run: |
          cargo tarpaulin \
            --packages exochain-node \
            --include-files "crates/exo-node/src/zerodentity/**" \
            --out xml \
            --output-dir coverage-zerodentity \
            --skip-clean \
            --engine llvm \
            --timeout 300 \
            --fail-under 80
      - name: Upload 0dentity coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: zerodentity-coverage-${{ github.sha }}
          path: coverage-zerodentity/cobertura.xml
          retention-days: 30

  # -----------------------------------------------------------------------
  # Gate 18: Root Genesis Crate Coverage (100% line coverage)
  # -----------------------------------------------------------------------
  root-genesis-coverage:
    name: "Gate 18 — Root Genesis Crate Coverage (100%)"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Install cargo-tarpaulin
        run: bash tools/ci_cargo_retry.sh cargo install cargo-tarpaulin --version 0.35.4 --locked
      - name: Run exo-root coverage
        run: |
          cargo tarpaulin \
            --packages exochain-root \
            --include-files "crates/exo-root/src/**" \
            --out xml \
            --out stdout \
            --output-dir coverage-exo-root \
            --skip-clean \
            --engine llvm \
            --timeout 600 \
            --fail-under 100
      - name: Upload exo-root coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: exo-root-coverage-${{ github.sha }}
          path: coverage-exo-root/cobertura.xml
          retention-days: 30

  # -----------------------------------------------------------------------
  # Gate 19: Root Genesis Portal Coverage (100% line coverage)
  # -----------------------------------------------------------------------
  root-genesis-portal-coverage:
    name: "Gate 19 — Root Genesis Portal Coverage (100%)"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - name: Install cargo-tarpaulin
        run: bash tools/ci_cargo_retry.sh cargo install cargo-tarpaulin --version 0.35.4 --locked
      - name: Run root genesis portal coverage
        run: |
          cargo tarpaulin \
            --packages exochain-node \
            --include-files "crates/exo-node/src/root_genesis.rs" \
            --out xml \
            --output-dir coverage-root-genesis-portal \
            --skip-clean \
            --engine llvm \
            --timeout 300 \
            --fail-under 100
      - name: Upload root genesis portal coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: root-genesis-portal-coverage-${{ github.sha }}
          path: coverage-root-genesis-portal/cobertura.xml
          retention-days: 30

  # -----------------------------------------------------------------------
  # Gate 20: WASM build
  # -----------------------------------------------------------------------
  build-wasm:
    name: "Gate 20 — WASM Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
      - name: Install wasm-pack
        run: bash tools/ci_cargo_retry.sh cargo install wasm-pack --version 0.14.0 --locked
      - name: Build WASM
        run: bash tools/ci_cargo_retry.sh wasm-pack build crates/exochain-wasm --target nodejs --scope exochain --out-dir ../../packages/exochain-wasm/wasm
      - name: Prepare scoped WASM npm package
        run: |
          cp LICENSE packages/exochain-wasm/wasm/LICENSE
          node tools/prepare_wasm_npm_package.mjs packages/exochain-wasm/wasm
      - name: Dry-pack WASM npm package
        run: npm pack --dry-run
        working-directory: packages/exochain-wasm/wasm
      - name: Verify WASM exports
        # Expected export count = 165. Baseline was 110 before
        # decision-forum, messaging, death-trigger, and franchise/NewCo
        # scaffold were added; the adjudicated decision transition bridge
        # adds the current security boundary, and the HonorGood economy bridge
        # adds the current settlement/provenance anchor helpers. The Catapult
        # receipt-chain bridge adds explicit actor-key signature verification,
        # the forum authority bridge adds trusted-root-key verification,
        # messaging adds caller-managed X25519 public-key derivation, and the
        # AVC bridge keeps legacy raw-subject-key entrypoints fail-closed and
        # adds external-signature payload/request builders plus explicit AVC
        # protocol/package metadata for trust receipts.
        run: |
          COUNT=$(grep -c "module.exports.wasm_" packages/exochain-wasm/wasm/exochain_wasm.js)
          echo "Found $COUNT WASM exports"
          [ "$COUNT" -eq 165 ] || (echo "Expected 165 exports, got $COUNT" && exit 1)
      - name: Upload WASM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: exochain-wasm
          path: packages/exochain-wasm/wasm/

  # -----------------------------------------------------------------------
  # Gate 21: Bridge verification
  # -----------------------------------------------------------------------
  test-bridge:
    name: "Gate 21 — Bridge Verification"
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: exochain-wasm
          path: packages/exochain-wasm/wasm/
      - name: Run bridge verification
        run: node packages/exochain-wasm/test/bridge_verification.mjs

  # -----------------------------------------------------------------------
  # Gate 22: WASM export count sync
  # -----------------------------------------------------------------------
  wasm-sync:
    name: "Gate 22 — WASM/JS Export Sync"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Verify Rust exports match JS expectations
        # Expected #[wasm_bindgen] count = 165. Baseline was 110 before the
        # Sprint-4 additions (decision-forum, messaging, death-trigger,
        # franchise/NewCo scaffold); the adjudicated decision transition bridge
        # adds the current security boundary, the HonorGood economy bridge
        # adds the current settlement/provenance anchor helpers, and Catapult
        # signed receipt-chain verification adds an explicit key-registry path,
        # forum authority verification adds a trusted-root-key path, the
        # messaging bridge adds a caller-managed X25519 public-key derivation
        # path, and the AVC bridge keeps legacy raw-subject-key entrypoints
        # fail-closed while adding external-signature payload/request builders
        # plus explicit AVC protocol/package metadata for trust-receipt
        # emission.
        run: |
          RUST_COUNT=$(grep -r '#\[wasm_bindgen\]' crates/exochain-wasm/src/ | wc -l | tr -d ' ')
          echo "Rust #[wasm_bindgen] exports: $RUST_COUNT"
          [ "$RUST_COUNT" -eq 165 ] || (echo "WASM export count changed from 165 to $RUST_COUNT — update bridge tests" && exit 1)

  # -----------------------------------------------------------------------
  # Gate 23: Unaudited feature matrix
  #
  # Every `unaudited-*` feature is default-off, so nothing else in CI ever
  # compiles the gated code — feature-gated surfaces can rot invisibly
  # (GAP-REGISTRY.md amendment, 2026-07-02). Each feature is exercised in
  # isolation so cross-feature interaction cannot mask breakage. Adding an
  # `unaudited-*` feature to any crate requires adding a matrix entry here.
  # -----------------------------------------------------------------------
  unaudited-feature-matrix:
    name: "Gate 23 — Unaudited Features (${{ matrix.feature }})"
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: exochain-node
            feature: unaudited-admin-governance-shortcut
          - package: exochain-node
            feature: unaudited-crosschecked-receipt-anchor
          - package: exochain-node
            feature: unaudited-mcp-simulation-tools
          - package: exochain-node
            feature: unaudited-zerodentity-first-touch-onboarding
          - package: exochain-node
            feature: unaudited-infrastructure-holons
          - package: exochain-node
            feature: unaudited-zerodentity-device-behavioral-axes
          - package: exochain-gateway
            feature: unaudited-gateway-graphql-api
          - package: exochain-proofs
            feature: unaudited-pedagogical-proofs
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050
        id: filter
        with:
          filters: |
            crates:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        if: steps.filter.outputs.crates == 'true'
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        if: steps.filter.outputs.crates == 'true'
      - name: Matrix completeness — every unaudited feature has an entry
        run: |
          missing=0
          for feat in $(grep -rhoE '^unaudited-[a-z-]+' crates/*/Cargo.toml | sort -u); do
            if ! grep -q "feature: ${feat}$" .github/workflows/ci.yml; then
              echo "unaudited feature '${feat}' has no Gate 23 matrix entry"
              missing=1
            fi
          done
          exit $missing
      - name: Test with the single unaudited feature enabled
        if: steps.filter.outputs.crates == 'true'
        run: cargo test -p ${{ matrix.package }} --features ${{ matrix.feature }}

  # -----------------------------------------------------------------------
  # Constitutional gate: all must pass
  # -----------------------------------------------------------------------
  all-gates:
    name: "All Constitutional Gates"
    runs-on: ubuntu-latest
    needs:
      - build
      - test
      - coverage
      - lint
      - format
      - audit
      - deny
      - doc
      - hygiene
      - sbom
      - machete
      - integration-tests
      - integration-tests-db
      - consensus-integration
      - state-sync-integration
      - cross-platform
      - zerodentity-coverage
      - root-genesis-coverage
      - root-genesis-portal-coverage
      - build-wasm
      - test-bridge
      - wasm-sync
      - unaudited-feature-matrix
    steps:
      - name: All quality gates passed
        run: echo "All CR-001 Section 8.8 quality gates satisfied."
