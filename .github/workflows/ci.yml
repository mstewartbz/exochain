# EXOCHAIN Constitutional CI
#
# Enforces CR-001 Section 8.8 quality gates.
# ALL gates must pass before any merge to main or release.
#
# Constitutional requirements enforced:
#   - Determinism: no floats, no HashMap, canonical serialization
#   - Clippy float_arithmetic = deny (workspace lint)
#   - 90%+ line coverage
#   - Zero dependency vulnerabilities
#   - License compliance (Apache-2.0; no copyleft contamination)

name: EXOCHAIN Constitutional CI
on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Determinism: force single-threaded codegen in CI to match release profile
  CARGO_BUILD_JOBS: "4"

jobs:
  # -----------------------------------------------------------------------
  # Gate 1: Build
  # -----------------------------------------------------------------------
  build:
    name: "Gate 1 — Build (release)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace (release)
        run: cargo build --workspace --release

  # -----------------------------------------------------------------------
  # Gate 2: Test
  # -----------------------------------------------------------------------
  test:
    name: "Gate 2 — Test"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run all workspace tests
        run: cargo test --workspace
      - name: Run tests in release mode (determinism check)
        run: cargo test --workspace --release

  # -----------------------------------------------------------------------
  # Gate 3: Coverage (90%+ line coverage required)
  # -----------------------------------------------------------------------
  coverage:
    name: "Gate 3 — Coverage (>= 90%)"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Run coverage
        # exochain-wasm: excluded — wasm bindings are exercised by the JS
        # bridge tests (Gate 21), not tarpaulin.
        # exo-proofs: excluded — the entire crate is gated behind
        # `unaudited-pedagogical-proofs` (default OFF) after PR #106.
        # With the feature OFF, the crate compiles to refusal stubs that
        # tarpaulin correctly reports as 0% covered. Testing the gated
        # code belongs in a separate dedicated tarpaulin pass under
        # `--features unaudited-pedagogical-proofs`; it is not in scope
        # for the default workspace coverage gate.
        run: |
          cargo tarpaulin \
            --workspace \
            --exclude exochain-wasm \
            --exclude exo-proofs \
            --out xml \
            --output-dir coverage \
            --skip-clean \
            --engine llvm \
            --timeout 300 \
            --fail-under 90
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/cobertura.xml

  # -----------------------------------------------------------------------
  # Gate 4: Lint (clippy with constitutional denials)
  # -----------------------------------------------------------------------
  lint:
    name: "Gate 4 — Clippy Lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (library and binary code, deny all warnings)
        run: cargo clippy --workspace --lib --bins -- -D warnings
      - name: Clippy (test code, allow expect/unwrap in tests)
        run: cargo clippy --workspace --tests --benches -- -D warnings -A clippy::expect_used -A clippy::unwrap_used

  # -----------------------------------------------------------------------
  # Gate 5: Format
  # -----------------------------------------------------------------------
  format:
    name: "Gate 5 — Format Check"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo +nightly fmt --all -- --check

  # -----------------------------------------------------------------------
  # Gate 6: Audit (dependency vulnerabilities)
  # -----------------------------------------------------------------------
  audit:
    name: "Gate 6 — Cargo Audit"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Audit dependencies (strict — vulnerabilities, unsound, unmaintained)
        # Historically this was `--deny warnings` (all warning classes,
        # including yanked). That fails today because `core2` was yanked
        # post-hoc by its maintainer and there is no safe upgrade path —
        # libp2p-core still depends on it. We deny the three classes we
        # can actually act on (vulnerability / unsound / unmaintained)
        # and let `yanked` land as a warning only. The specific yanked
        # crate (core2) is documented in deny.toml and .cargo/audit.toml
        # with reachability analysis.
        run: cargo audit --deny unsound --deny unmaintained

  # -----------------------------------------------------------------------
  # Gate 7: Deny (license + advisory compliance)
  # -----------------------------------------------------------------------
  deny:
    name: "Gate 7 — Cargo Deny"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # -----------------------------------------------------------------------
  # Gate 8: Documentation (must build without warnings)
  # -----------------------------------------------------------------------
  doc:
    name: "Gate 8 — Documentation"
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build documentation
        run: cargo doc --workspace --no-deps

  # -----------------------------------------------------------------------
  # Gate 9: Repo Hygiene (no generated dirs, no secrets)
  # -----------------------------------------------------------------------
  hygiene:
    name: "Gate 9 — Repo Hygiene"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No tracked node_modules
        run: |
          if git ls-files --error-unmatch node_modules/ 2>/dev/null; then
            echo "::error::node_modules/ is tracked in git"
            exit 1
          fi
          echo "✓ node_modules not tracked"
      - name: No tracked __pycache__
        run: |
          if git ls-files --error-unmatch '**/__pycache__/' 2>/dev/null; then
            echo "::error::__pycache__/ is tracked in git"
            exit 1
          fi
          echo "✓ __pycache__ not tracked"
      - name: No tracked build artifacts
        run: |
          if git ls-files --error-unmatch 'web/dist/' 'demo/web/dist/' 2>/dev/null; then
            echo "::error::build artifacts are tracked in git"
            exit 1
          fi
          echo "✓ build artifacts not tracked"
      - name: No .env files tracked
        run: |
          if git ls-files '*.env' '.env*' | grep -v '\.example$' | grep -q .; then
            echo "::error::.env files are tracked in git"
            exit 1
          fi
          echo "✓ no .env files tracked"
      - name: License consistency check
        run: |
          CARGO_LICENSE=$(grep '^license' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$CARGO_LICENSE" != "Apache-2.0" ]; then
            echo "::error::Cargo.toml license is '$CARGO_LICENSE', expected 'Apache-2.0'"
            exit 1
          fi
          if ! head -1 LICENSE | grep -qi "apache"; then
            echo "::error::LICENSE file does not appear to be Apache-2.0"
            exit 1
          fi
          echo "✓ License consistent: Apache-2.0"
      - name: No GAP stubs remaining in code (A-102)
        # Fails if any `STUB` marker referencing a GAP-NNN identifier
        # remains in a code file. Prevents a GAP from being marked closed
        # in GAP-REGISTRY.md while a stub still lives in the tree.
        run: |
          MATCHES=$(grep -rEn "STUB[^\n]*GAP-0[0-9][0-9]" \
            --include='*.rs' --include='*.ts' --include='*.py' \
            crates/ packages/ web/src/ 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "::error::GAP stubs remain in code:"
            echo "$MATCHES"
            exit 1
          fi
          echo "✓ No GAP stubs remaining in code"
      - name: Repo truth and public claims
        run: bash tools/test_repo_truth.sh

  # -----------------------------------------------------------------------
  # Gate 10: SBOM (dry-run generation — no upload, validates toolchain)
  # -----------------------------------------------------------------------
  sbom:
    name: "Gate 10 — SBOM Dry-Run"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx
      - name: Generate CycloneDX SBOM (validation only)
        run: cargo cyclonedx --manifest-path Cargo.toml --format json
      - name: Validate SBOM output
        run: |
          SBOM_COUNT=$(find . -name '*.cdx.json' -o -name '*bom*.json' | head -20 | wc -l)
          if [ "$SBOM_COUNT" -eq 0 ]; then
            echo "::error::SBOM generation produced no output files"
            exit 1
          fi
          echo "✓ CycloneDX SBOM generated successfully ($SBOM_COUNT files):"
          find . -name '*.cdx.json' -o -name '*bom*.json' | head -20
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-ci-${{ github.sha }}
          path: |
            **/*.cdx.json
            **/bom*.json
          if-no-files-found: warn
          retention-days: 90

  # -----------------------------------------------------------------------
  # Gate 11: Unused Dependencies (cargo-machete)
  # -----------------------------------------------------------------------
  machete:
    name: "Gate 11 — Unused Dependencies (cargo-machete)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-machete
        run: cargo install cargo-machete
      - name: Check for unused dependencies
        run: cargo machete

  # -----------------------------------------------------------------------
  # Gate 12: Integration tests — runs on every gateway route PR
  #
  # Uses dorny/paths-filter to detect crates/exo-gateway/** changes.
  # The job always runs; the test step is skipped when no gateway files
  # changed so all-gates can include it unconditionally.
  # -----------------------------------------------------------------------
  integration-tests:
    name: "Gate 12 — Integration Tests (gateway)"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            gateway:
              - 'crates/exo-gateway/**'
      - uses: dtolnay/rust-toolchain@stable
        if: steps.filter.outputs.gateway == 'true'
      - uses: Swatinem/rust-cache@v2
        if: steps.filter.outputs.gateway == 'true'
      - name: Run workspace integration tests
        if: steps.filter.outputs.gateway == 'true'
        run: cargo test --workspace --test '*'

  # -----------------------------------------------------------------------
  # Gate 13: DB-backed integration tests (production-db feature, live Postgres)
  # -----------------------------------------------------------------------
  integration-tests-db:
    name: "Gate 13 — DB Integration Tests (production-db)"
    runs-on: ubuntu-latest
    needs: build
    env:
      DATABASE_URL: postgres://exochain:test@localhost:5432/exochain_test
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Start Postgres via docker compose
        run: docker compose -f docker-compose.ci.yml up -d
      - name: Wait for Postgres to be healthy
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -U exochain -d exochain_test && break
            echo "Waiting for postgres... ($i/30)"
            sleep 3
          done
          pg_isready -h localhost -U exochain -d exochain_test
      - name: Install sqlx-cli (postgres only, no default TLS)
        run: cargo install sqlx-cli --no-default-features --features postgres,rustls
      - name: Run migrations
        run: sqlx migrate run --source crates/exo-gateway/migrations
      - name: Run DB-backed integration tests
        run: cargo test --workspace --test '*' --features exo-gateway/production-db
      - name: Stop Postgres
        if: always()
        run: docker compose -f docker-compose.ci.yml down

  # -----------------------------------------------------------------------
  # Gate 14: Multi-node consensus integration test
  #
  # Validates that the BFT consensus reactor, state sync, and P2P
  # networking all function correctly in exo-node.
  # -----------------------------------------------------------------------
  consensus-integration:
    name: "Gate 14 — Consensus Integration Tests"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            node:
              - 'crates/exo-node/**'
              - 'crates/exo-dag/**'
      - uses: dtolnay/rust-toolchain@stable
        if: steps.filter.outputs.node == 'true'
      - uses: Swatinem/rust-cache@v2
        if: steps.filter.outputs.node == 'true'
      - name: Run exo-node unit and integration tests
        if: steps.filter.outputs.node == 'true'
        run: cargo test -p exo-node
      - name: Run exo-dag consensus tests
        if: steps.filter.outputs.node == 'true'
        run: cargo test -p exo-dag -- consensus

  # -----------------------------------------------------------------------
  # Gate 15: State sync and join test
  #
  # Verifies the sync engine, wire protocol, and DAG store functionality
  # work correctly for new node bootstrap.
  # -----------------------------------------------------------------------
  state-sync-integration:
    name: "Gate 15 — State Sync & Join Tests"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            sync:
              - 'crates/exo-node/**'
      - uses: dtolnay/rust-toolchain@stable
        if: steps.filter.outputs.sync == 'true'
      - uses: Swatinem/rust-cache@v2
        if: steps.filter.outputs.sync == 'true'
      - name: Run sync engine tests
        if: steps.filter.outputs.sync == 'true'
        run: cargo test -p exo-node -- sync
      - name: Run store tests
        if: steps.filter.outputs.sync == 'true'
        run: cargo test -p exo-node -- store
      - name: Run wire protocol tests
        if: steps.filter.outputs.sync == 'true'
        run: cargo test -p exo-node -- wire
      - name: Run metrics tests
        if: steps.filter.outputs.sync == 'true'
        run: cargo test -p exo-node -- metrics

  # -----------------------------------------------------------------------
  # Gate 16: Cross-platform binary build
  #
  # Verifies the exochain binary compiles on all target platforms.
  # Does not run tests (that is Gate 14-15's job) — only build verification.
  # -----------------------------------------------------------------------
  cross-platform:
    name: "Gate 16 — Cross-Platform Build (${{ matrix.target }})"
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build exochain binary
        run: cargo build --release --bin exochain --target ${{ matrix.target }}
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: exochain-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/exochain
          retention-days: 30

  # -----------------------------------------------------------------------
  # Gate 17: 0dentity Module Coverage (≥ 80% line coverage)
  #
  # Scoped to crates/exo-node/src/zerodentity/** only.
  # Uses --include-files to restrict tarpaulin reporting to that subtree,
  # then fails if the measured line coverage falls below 80%.
  # -----------------------------------------------------------------------
  zerodentity-coverage:
    name: "Gate 17 — 0dentity Module Coverage (>= 80%)"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      - name: Run 0dentity module coverage
        run: |
          cargo tarpaulin \
            --packages exo-node \
            --include-files "crates/exo-node/src/zerodentity/**" \
            --out xml \
            --output-dir coverage-zerodentity \
            --skip-clean \
            --engine llvm \
            --timeout 120 \
            --fail-under 80
      - name: Upload 0dentity coverage report
        uses: actions/upload-artifact@v4
        with:
          name: zerodentity-coverage-${{ github.sha }}
          path: coverage-zerodentity/cobertura.xml
          retention-days: 30

  # -----------------------------------------------------------------------
  # Gate 20: WASM build
  # -----------------------------------------------------------------------
  build-wasm:
    name: "Gate 20 — WASM Build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM
        run: wasm-pack build crates/exochain-wasm --target nodejs --out-dir ../../packages/exochain-wasm/wasm
      - name: Verify WASM exports
        # Expected export count = 140. Baseline was 110 before
        # decision-forum, messaging, death-trigger, and franchise/NewCo
        # scaffold were added. Remaining bridge coverage debt is tracked in
        # Initiative `wasm-bridge-test-coverage`.
        run: |
          COUNT=$(grep -c "module.exports.wasm_" packages/exochain-wasm/wasm/exochain_wasm.js)
          echo "Found $COUNT WASM exports"
          [ "$COUNT" -eq 140 ] || (echo "Expected 140 exports, got $COUNT" && exit 1)
      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: exochain-wasm
          path: packages/exochain-wasm/wasm/

  # -----------------------------------------------------------------------
  # Gate 21: Bridge verification
  # -----------------------------------------------------------------------
  test-bridge:
    name: "Gate 21 — Bridge Verification"
    runs-on: ubuntu-latest
    needs: build-wasm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/download-artifact@v4
        with:
          name: exochain-wasm
          path: packages/exochain-wasm/wasm/
      - name: Run bridge verification
        run: node packages/exochain-wasm/test/bridge_verification.mjs

  # -----------------------------------------------------------------------
  # Gate 22: WASM export count sync
  # -----------------------------------------------------------------------
  wasm-sync:
    name: "Gate 22 — WASM/JS Export Sync"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Rust exports match JS expectations
        # Expected #[wasm_bindgen] count = 140. Baseline was 110 before the
        # Sprint-4 additions (decision-forum, messaging, death-trigger,
        # franchise/NewCo scaffold). Remaining bridge coverage debt is tracked
        # in initiative `wasm-bridge-test-coverage`.
        run: |
          RUST_COUNT=$(grep -r '#\[wasm_bindgen\]' crates/exochain-wasm/src/ | wc -l | tr -d ' ')
          echo "Rust #[wasm_bindgen] exports: $RUST_COUNT"
          [ "$RUST_COUNT" -eq 140 ] || (echo "WASM export count changed from 140 to $RUST_COUNT — update bridge tests" && exit 1)

  # -----------------------------------------------------------------------
  # Constitutional gate: all must pass
  # -----------------------------------------------------------------------
  all-gates:
    name: "All Constitutional Gates"
    runs-on: ubuntu-latest
    needs:
      - build
      - test
      - coverage
      - lint
      - format
      - audit
      - deny
      - doc
      - hygiene
      - sbom
      - machete
      - integration-tests
      - integration-tests-db
      - consensus-integration
      - state-sync-integration
      - cross-platform
      - zerodentity-coverage
      - build-wasm
      - test-bridge
      - wasm-sync
    steps:
      - name: All quality gates passed
        run: echo "All CR-001 Section 8.8 quality gates satisfied."
