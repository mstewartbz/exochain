[package]
name = "decision-forum"
version = "1.0.0"
edition = "2021"
description = "decision.forum — Constitutional governance protocol. Sovereign Decision Objects with cryptographic provenance, TNC enforcement, and fiduciary defense (PRD 1.1.0)"
license = "Apache-2.0"
authors = ["Aeon/ExoChain Council"]

[dependencies]
ed25519-dalek = { version = "2.1", features = ["serde", "rand_core"] }
sha2 = "0.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
