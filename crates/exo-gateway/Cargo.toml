[package]
name = "exo-gateway"
description = "EXOCHAIN constitutional trust fabric — HTTP gateway server with default-deny pattern"
documentation = "https://docs.exochain.io"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lints]
workspace = true

[dependencies]
decision-forum = { path = "../decision-forum" }
exo-core = { path = "../exo-core" }
exo-identity = { path = "../exo-identity" }
exo-consent = { path = "../exo-consent" }
exo-gatekeeper = { path = "../exo-gatekeeper" }
exo-governance = { path = "../exo-governance" }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
sqlx = { workspace = true }
hex = { workspace = true }
blake3 = { workspace = true }
chrono = { workspace = true, features = ["std", "now"] }
getrandom = { workspace = true }
ciborium = { workspace = true }
tracing-subscriber = { workspace = true }
async-graphql = { workspace = true }
async-graphql-axum = { workspace = true }
async-stream = { workspace = true }

[features]
## Enable the production DB-backed adjudication context resolver.
##
## When this feature is active, `AppState::build_adjudication_context` queries
## `agent_roles`, `consent_records`, and `authority_chains` instead of returning
## the WO-009 deny-all scaffold.  The scaffold remains the default so that
## dev/test environments do not need a live database.
production-db = []

[dev-dependencies]
serde_json = { workspace = true }
tower = { workspace = true }
bs58 = { workspace = true }
