[package]
name = "exo-node"
description = "EXOCHAIN distributed node — single binary for joining and participating in the constitutional governance network"
documentation = "https://docs.exochain.io"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "exochain"
path = "src/main.rs"

[lints]
workspace = true

[dependencies]
# Workspace crates
exo-core = { path = "../exo-core" }
exo-dag = { path = "../exo-dag" }
exo-gatekeeper = { path = "../exo-gatekeeper" }
exo-gateway = { path = "../exo-gateway" }
exo-api = { path = "../exo-api" }
exo-governance = { path = "../exo-governance" }
exo-identity = { path = "../exo-identity" }
exo-consent = { path = "../exo-consent" }
exo-escalation = { path = "../exo-escalation" }

# CLI
clap = { version = "4", features = ["derive"] }

# Configuration
serde = { workspace = true }
serde_json = { workspace = true }
toml = "0.8"

# Storage
rusqlite = { version = "0.32", features = ["bundled"] }

# Async runtime
tokio = { workspace = true }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }

# Crypto (identity bootstrap)
ed25519-dalek = { workspace = true }
blake3 = { workspace = true }
rand = { workspace = true }
sha2 = { workspace = true }
hmac = { workspace = true }
zeroize = { workspace = true }

# Data directory
directories = "6"

# Serialization (CBOR for DagNode persistence)
ciborium = { workspace = true }

# HTTP (metrics route, MCP SSE transport)
axum = { workspace = true }
async-stream = { workspace = true }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# P2P networking
libp2p = { version = "0.54", features = [
    "tokio", "tcp", "quic", "noise", "yamux",
    "gossipsub", "kad", "identify", "mdns", "ping",
    "macros", "request-response", "cbor", "serde",
] }
futures = "0.3"

# Hex encoding for peer display
hex = { workspace = true }

# Secure random token generation
getrandom = { workspace = true }

# UUID for challenge IDs
uuid = { workspace = true }

# HTTP client for Telegram bot API
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

[dev-dependencies]
tempfile = "3"
tower = "0.5"

[package.metadata.cargo-machete]
# Pre-existing workspace deps used via re-exports or conditional compilation.
ignored = ["ed25519-dalek", "exo-consent", "exo-governance", "exo-identity", "zeroize"]

[features]
default = []

# GAP (Onyx pass 3, RED): the HTTP endpoint
# `POST /api/v1/governance/validators` currently mutates the validator
# set unilaterally on presentation of the node's admin bearer token —
# no BFT proposal, no quorum, no signature chain, no recorded
# governance event. A single holder of the admin bearer token is
# therefore a constitutional dictator over validator membership.
#
# The real fix is to replace this endpoint with a proper submit-proposal
# → quorum-vote → commit flow wired through exo-governance + the DAG.
# That is a governance-surface rewrite, not a tactical patch. Until
# that work lands, we REFUSE the shortcut by default and gate the
# legacy behavior behind this explicit, loud feature flag so no operator
# trips over it accidentally.
#
# Do NOT enable this in production. Enabling it means: "I accept that a
# single bearer-token holder controls validator set mutation, without
# quorum or on-chain record."
unaudited-admin-governance-shortcut = []
