version: "3.9"

networks:
  exochain:
    driver: bridge

volumes:
  pgdata:

x-demo-dagdb-env: &demo-dagdb-env
  EXO_DEMO_DAGDB_GATEWAY_URL: ${EXO_DEMO_DAGDB_GATEWAY_URL:?set EXO_DEMO_DAGDB_GATEWAY_URL to the EXOCHAIN DAG DB gateway origin}
  EXO_DEMO_DAGDB_AUTH_TOKEN: ${EXO_DEMO_DAGDB_AUTH_TOKEN:?set EXO_DEMO_DAGDB_AUTH_TOKEN}
  EXO_DEMO_DAGDB_TENANT_ID: ${EXO_DEMO_DAGDB_TENANT_ID:?set EXO_DEMO_DAGDB_TENANT_ID}
  EXO_DEMO_DAGDB_NAMESPACE: ${EXO_DEMO_DAGDB_NAMESPACE:?set EXO_DEMO_DAGDB_NAMESPACE}
  EXO_DEMO_DAGDB_OWNER_DID: ${EXO_DEMO_DAGDB_OWNER_DID:?set EXO_DEMO_DAGDB_OWNER_DID}
  EXO_DEMO_DAGDB_CONTROLLER_DID: ${EXO_DEMO_DAGDB_CONTROLLER_DID:?set EXO_DEMO_DAGDB_CONTROLLER_DID}
  EXO_DEMO_DAGDB_SUBMITTED_BY_DID: ${EXO_DEMO_DAGDB_SUBMITTED_BY_DID:?set EXO_DEMO_DAGDB_SUBMITTED_BY_DID}
  EXO_DEMO_DAGDB_WRITE_SIGNATURE: ${EXO_DEMO_DAGDB_WRITE_SIGNATURE:?set EXO_DEMO_DAGDB_WRITE_SIGNATURE}

services:
  # ── Legacy PostgreSQL fixture (not a production writer) ─────────
  postgres:
    profiles: ["legacy-postgres-fixture"]
    image: postgres:16-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-exochain}
      POSTGRES_USER: ${POSTGRES_USER:-exochain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD for the legacy fixture}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-exochain}"]
      interval: 5s
      retries: 10
    networks: [exochain]

  # ── Gateway API (3000) — orchestrator ──────────────────────────
  gateway-api:
    build:
      context: ../
      dockerfile: demo/infra/Dockerfile.service
      args:
        SERVICE: gateway-api
    ports: ["3000:3000"]
    environment:
      <<: *demo-dagdb-env
      PORT: 3000
      SERVICE_NAME: gateway-api
    networks: [exochain]

  # ── Identity Service (3001) ────────────────────────────────────
  identity-service:
    build:
      context: ../
      dockerfile: demo/infra/Dockerfile.service
      args:
        SERVICE: identity-service
    ports: ["3001:3001"]
    environment:
      <<: *demo-dagdb-env
      PORT: 3001
      SERVICE_NAME: identity-service
    networks: [exochain]

  # ── Consent Service (3002) ─────────────────────────────────────
  consent-service:
    build:
      context: ../
      dockerfile: demo/infra/Dockerfile.service
      args:
        SERVICE: consent-service
    ports: ["3002:3002"]
    environment:
      <<: *demo-dagdb-env
      PORT: 3002
      SERVICE_NAME: consent-service
    networks: [exochain]

  # ── Governance Engine (3003) ───────────────────────────────────
  governance-engine:
    build:
      context: ../
      dockerfile: demo/infra/Dockerfile.service
      args:
        SERVICE: governance-engine
    ports: ["3003:3003"]
    environment:
      <<: *demo-dagdb-env
      PORT: 3003
      SERVICE_NAME: governance-engine
    networks: [exochain]

  # ── Decision Forge (3004) ──────────────────────────────────────
  decision-forge:
    build:
      context: ../
      dockerfile: demo/infra/Dockerfile.service
      args:
        SERVICE: decision-forge
    ports: ["3004:3004"]
    environment:
      <<: *demo-dagdb-env
      PORT: 3004
      SERVICE_NAME: decision-forge
    networks: [exochain]

  # ── Audit API (3007) ───────────────────────────────────────────
  audit-api:
    build:
      context: ../
      dockerfile: demo/infra/Dockerfile.service
      args:
        SERVICE: audit-api
    ports: ["3007:3007"]
    environment:
      <<: *demo-dagdb-env
      PORT: 3007
      SERVICE_NAME: audit-api
    networks: [exochain]

  # ── Provenance Writer (3006) ───────────────────────────────────
  provenance-writer:
    build:
      context: ../
      dockerfile: demo/infra/Dockerfile.service
      args:
        SERVICE: provenance-writer
    ports: ["3006:3006"]
    environment:
      <<: *demo-dagdb-env
      PORT: 3006
      SERVICE_NAME: provenance-writer
    networks: [exochain]
