# EXOCHAIN rustfmt configuration
#
# Enforces consistent formatting across the constitutional trust fabric.
# Uses Rust edition 2024 formatting rules.

edition = "2024"
max_width = 100
tab_spaces = 4
use_small_heuristics = "Default"

# Import organization
imports_granularity = "Crate"
group_imports = "StdExternalCrate"
reorder_imports = true
reorder_modules = true

# Expression formatting
chain_width = 60
fn_call_width = 60
single_line_if_else_max_width = 50

# Consistent newlines
newline_style = "Unix"

# Comments
normalize_comments = false
wrap_comments = false
comment_width = 100
